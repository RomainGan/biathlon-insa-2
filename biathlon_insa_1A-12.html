// ─── HELPERS ─────────────────────────────────────────────────────────────────
function fmt(d){var p=d.split("-");return p[2]+"/"+p[1]+"/"+p[0];}
function fmtShort(d){var p=d.split("-");return p[2]+"/"+p[1];}
function fmtTime(s){
  if(s===null||s===undefined||isNaN(s)||s<0)return"--:--";
  var abs=Math.round(s),m=Math.floor(abs/60),hh=Math.floor(m/60);
  if(hh>0)return hh+":"+pad(m%60)+":"+pad(abs%60);
  return pad(m)+":"+pad(abs%60);
}
function pad(n){return n<10?"0"+n:String(n);}
function parseMMSS(str){
  if(!str||!str.trim())return 0;
  var p=str.trim().split(":");
  return p.length===2?(parseInt(p[0])||0)*60+(parseInt(p[1])||0):(parseFloat(str)||0);
}
function flatArr(arr){var r=[];(function f(a){for(var i=0;i<a.length;i++){if(Array.isArray(a[i]))f(a[i]);else r.push(a[i]);}})(arr);return r;}
function h(tag,attrs){
  var el=document.createElement(tag);
  var children=Array.prototype.slice.call(arguments,2);
  if(attrs){
    var keys=Object.keys(attrs);
    for(var ki=0;ki<keys.length;ki++){
      var k=keys[ki],v=attrs[k];
      if(k==="style"&&typeof v==="object"){var sk=Object.keys(v);for(var si=0;si<sk.length;si++)el.style[sk[si]]=v[sk[si]];}
      else if(k==="className")el.className=v;
      else if(k.slice(0,2)==="on")el.addEventListener(k.slice(2).toLowerCase(),v);
      else el.setAttribute(k,v);
    }
  }
  flatArr(children).forEach(function(c){
    if(c!==null&&c!==undefined&&c!==false)
      el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);
  });
  return el;
}
function d(style){var el=document.createElement("div");if(style){var sk=Object.keys(style);for(var i=0;i<sk.length;i++)el.style[sk[i]]=style[sk[i]];}return el;}
function txt(s){return document.createTextNode(s);}

function getRaceSessions(){return SESSIONS.filter(function(s){return s.type!=="break";});}

function findCurrentSession(){
  var rs=SESSIONS.filter(function(s){return s.type!=="break";});
  var best=rs[0];
  for(var i=0;i<rs.length;i++){if(rs[i].date<=TODAY)best=rs[i];}
  return best.id;
}

function setState(patch){
  var keys=Object.keys(patch);
  for(var i=0;i<keys.length;i++)state[keys[i]]=patch[keys[i]];
  render();
}
function flash(){setState({saveFlash:true});setTimeout(function(){setState({saveFlash:false});},700);}

// ─── DATA HELPERS ────────────────────────────────────────────────────────────
function getStatus(sId,stId){return((state.attendance[sId]||{})[stId])||"";}
function getTir(sId,stId){return((state.shooting[sId]||{})[stId])||{};}

function cycleStatus(stId){
  var st=getStudents().find(function(s){return s.id===stId;});
  var cycle=st.ds==="SHN"?["SHN","P","ABS","RET"]:st.ds==="AMG"?["AMG","P","ABS","RET"]:["","P","ABS","RET"];
  var cur=getStatus(state.sessionId,stId);
  var idx=cycle.indexOf(cur);
  var next=cycle[(idx+1)%cycle.length];
  var att=Object.assign({},state.attendance);
  att[state.sessionId]=Object.assign({},att[state.sessionId]||{});
  att[state.sessionId][stId]=next;
  save("att_"+CURRENT_GROUP_ID,att);
  setState({attendance:att});
  flash();
}

function setTir(stId,key,val){
  var sId=state.sessionId;
  var sho=Object.assign({},state.shooting);
  sho[sId]=Object.assign({},sho[sId]||{});
  sho[sId][stId]=Object.assign({},sho[sId][stId]||{});
  sho[sId][stId][key]=val;
  save("sho_"+CURRENT_GROUP_ID,sho);
  setState({shooting:sho});
}

function calcMissed(stId,sId){
  var session=SESSIONS.find(function(s){return s.id===sId;});
  if(!session||!session.tirs)return null;
  var tir=getTir(sId,stId);
  var missed=0,hasData=false;
  for(var i=1;i<=session.tirs;i++){var v=tir["t"+i];if(v!==null&&v!==undefined){missed+=5-v;hasData=true;}}
  return hasData?missed:null;
}

function getStudentResult(stId,sId){
  var session=SESSIONS.find(function(s){return s.id===sId;});
  var rd=state.raceData[sId];
  if(!rd||!session)return null;
  for(var wi=0;wi<rd.waves.length;wi++){
    var wave=rd.waves[wi];
    if(wave.studentIds.indexOf(stId)<0)continue;
    // Manual entry mode
    if(wave.manualTimes&&wave.manualTimes[stId]!==undefined){
      var rawSecs=wave.manualTimes[stId];
      var offset=(wave.startOffsets||{})[stId]||0;
      var runSecs=rawSecs-offset;
      if(session.penaltyType==="seconds"){
        var missed=calcMissed(stId,sId)||0;
        return{runSecs:runSecs,offset:offset,missed:missed,finalTime:runSecs+missed*(session.penaltyPerMiss||10),manual:true};
      }
      return{runSecs:runSecs,offset:offset,missed:null,finalTime:runSecs,manual:true};
    }
    // Live timing
    var arrival=(wave.arrivals||{})[stId];
    if(!arrival||!wave.startedAt)return null;
    var offset2=(wave.startOffsets||{})[stId]||0;
    var runSecs2=(arrival-wave.startedAt)/1000-offset2;
    if(session.penaltyType==="seconds"){
      var missed2=calcMissed(stId,sId)||0;
      return{runSecs:runSecs2,offset:offset2,missed:missed2,finalTime:runSecs2+missed2*(session.penaltyPerMiss||10),manual:false};
    }
    return{runSecs:runSecs2,offset:offset2,missed:null,finalTime:runSecs2,manual:false};
  }
  return null;
}

function getSessionRanking(sId){
  var rd=state.raceData[sId];
  if(!rd)return[];
  var rows=[];
  for(var wi=0;wi<rd.waves.length;wi++){
    var wave=rd.waves[wi];
    for(var si=0;si<wave.studentIds.length;si++){
      var sid=wave.studentIds[si];
      var r=getStudentResult(sid,sId);
      if(r)rows.push(Object.assign({studentId:sid},r));
    }
  }
  return rows.sort(function(a,b){return a.finalTime-b.finalTime;});
}

function saveRd(sId,rd){
  var raceData=Object.assign({},state.raceData);
  raceData[sId]=rd;
  save("raceData_"+CURRENT_GROUP_ID,raceData);
  setState({raceData:raceData});
  flash();
}

function updateWave(waveId,fn){
  var sId=state.sessionId;
  var rd=state.raceData[sId]||{waves:[]};
  var waves=rd.waves.map(function(w){return w.id===waveId?fn(w):w;});
  saveRd(sId,Object.assign({},rd,{waves:waves}));
}

function getAttendanceRate(stId){
  var raceSess=SESSIONS.filter(function(s){return s.type!=="break";});
  var past=raceSess.filter(function(s){return s.date<=TODAY;});
  if(!past.length)return null;
  var present=past.filter(function(s){
    var st=getStatus(s.id,stId);
    return st==="P"||st==="SHN"||st==="AMG"||st==="RET";
  });
  return Math.round(present.length/past.length*100);
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  var root=document.getElementById("root");
  root.innerHTML="";
  root.appendChild(buildApp());
  startChronos();
}

function startChronos(){
  var ids=Object.keys(chronoIntervals);
  for(var i=0;i<ids.length;i++)clearInterval(chronoIntervals[ids[i]]);
  chronoIntervals={};
  var sId=state.sessionId;
  var rd=state.raceData[sId];
  if(!rd||state.tab!=="course"||state.courseSubTab!=="course")return;
  rd.waves.forEach(function(wave){
    if(!wave.startedAt)return;
    var allDone=wave.studentIds.every(function(id){return(wave.arrivals||{})[id];});
    if(allDone)return;
    var id=setInterval(function(){
      var elapsed=(Date.now()-wave.startedAt)/1000;
      // Update main chrono
      var el2=document.getElementById("chrono-"+wave.id);
      if(el2)el2.textContent=fmtTime(elapsed);
      // Update per-student countdowns
      wave.studentIds.forEach(function(sid){
        var cntEl=document.getElementById("cnt-"+wave.id+"-"+sid);
        if(!cntEl)return;
        var offset=(wave.startOffsets||{})[sid]||0;
        var timeUntil=offset-elapsed;
        if(timeUntil<=0){
          // Already left — remove countdown, let next render handle it
          // Trigger re-render only if just crossed threshold
          if(cntEl.dataset.wasActive){
            delete cntEl.dataset.wasActive;
            render();
          }
          return;
        }
        var cntNum=Math.ceil(timeUntil);
        cntEl.dataset.wasActive="1";
        if(timeUntil<=5){
          cntEl.style.fontSize="28px";
          cntEl.style.color=cntNum<=3?"#ef4444":"#f59e0b";
          cntEl.style.fontWeight="900";
          cntEl.textContent=cntNum<=0?"GO !":cntNum;
          // Flash border on parent button
          var btn=cntEl.closest?cntEl.closest("button"):null;
          if(btn&&cntNum<=3){btn.style.borderColor="#ef4444";btn.style.background="#1e0a0a";}
        } else {
          cntEl.style.fontSize="13px";
          cntEl.style.color="#a78bfa";
          cntEl.style.fontWeight="700";
          cntEl.textContent="+"+fmtTime(offset);
        }
      });
    },100);
    chronoIntervals[wave.id]=id;

function buildTirSection(session){
  var sId=state.sessionId;
  var div=d({});
  if(!session.tirs){
    var box=d({background:"#0d1525",border:"1px solid #1e293b",borderRadius:"10px",padding:"24px",textAlign:"center",color:"#475569"});
    box.appendChild(h("div",{style:{fontSize:"36px",marginBottom:"8px"}},"🎿"));
    box.appendChild(h("div",{style:{fontSize:"14px"}},"Pas de tir pour "+session.label));
    div.appendChild(box);return div;
  }
  // Tir structure header
  var bar=d({background:"#0d1525",border:"1px solid #1e3a5f",borderRadius:"10px",padding:"10px 14px",marginBottom:"12px",display:"flex",flexWrap:"wrap",gap:"8px",alignItems:"center"});
  session.tirLabels.forEach(function(lbl,i){
    bar.appendChild(h("span",{style:{background:lbl==="C"?"#0f2d4c":"#1c1040",color:lbl==="C"?"#60a5fa":"#a78bfa",border:"1px solid "+(lbl==="C"?"#3b82f6":"#7c3aed"),borderRadius:"6px",padding:"4px 10px",fontSize:"12px",fontWeight:"700"}},"T"+(i+1)+" "+(lbl==="C"?"🔵 Couché":"🟣 Debout")));
  });
  bar.appendChild(h("span",{style:{color:"#64748b",fontSize:"12px",marginLeft:"auto"}},"5 balles/tir"));
  div.appendChild(bar);

  var rd=state.raceData[sId]||{waves:[]};
  var presentStudents=getStudents().filter(function(s){var st=getStatus(sId,s.id)||(s.ds!=="normal"?s.ds:"");return st!=="ABS";});
  var assignedIds={};
  rd.waves.forEach(function(w){w.studentIds.forEach(function(id){assignedIds[id]=true;});});
  var unassigned=presentStudents.filter(function(s){return!assignedIds[s.id];});

  function makeTirRow(s){
    var tir=getTir(sId,s.id);
    var vals=[],hits=0,done=0;
    for(var i=1;i<=session.tirs;i++){var v=tir["t"+i];vals.push(v!==undefined?v:null);if(v!==null&&v!==undefined){done++;hits+=v;}}
    var pct=done>0?Math.round(hits/(done*5)*100):null;
    var btn=h("button",{style:{background:"#0a1428",border:"1px solid "+(done>0?"#1e4d8c":"#1e293b"),borderRadius:"10px",padding:"10px 12px",display:"flex",alignItems:"center",gap:"10px",width:"100%",textAlign:"left"},onClick:function(id){return function(){setState({tirModal:id});};}(s.id)});
    var info=d({flex:"1"});
    var nm=d({});nm.appendChild(h("span",{style:{color:"#f1f5f9",fontWeight:"700",fontSize:"14px"}},s.nom+" "));nm.appendChild(h("span",{style:{color:"#94a3b8",fontSize:"13px"}},s.prenom));info.appendChild(nm);
    if(done>0){
      var chips=d({display:"flex",gap:"5px",marginTop:"4px",flexWrap:"wrap"});
      vals.forEach(function(v,i){chips.appendChild(h("span",{style:{fontSize:"12px",color:v===null?"#334155":v>=4?"#22c55e":v>=2?"#f59e0b":"#ef4444",background:"#0d1525",border:"1px solid #1e293b",borderRadius:"4px",padding:"2px 6px",fontWeight:"600"}},"T"+(i+1)+":"+(v===null?"—":v+"/5")));});
      info.appendChild(chips);
    }
    var score=d({textAlign:"right",minWidth:"52px"});
    if(done===0)score.appendChild(h("span",{style:{color:"#334155",fontSize:"12px"}},"—"));
    else{score.appendChild(h("div",{style:{color:pct>=60?"#22c55e":pct>=33?"#f59e0b":"#ef4444",fontWeight:"700",fontSize:"18px"}},hits+"/"+(done*5)));score.appendChild(h("div",{style:{color:"#64748b",fontSize:"11px"}},pct+"%"));}
    btn.appendChild(info);btn.appendChild(score);btn.appendChild(h("span",{style:{color:"#334155",fontSize:"16px"}},"›"));
    return btn;
  }

  // Render by wave groups
  rd.waves.forEach(function(wave){
    var waveStudents=presentStudents.filter(function(s){return wave.studentIds.indexOf(s.id)>=0;});
    if(!waveStudents.length)return;
    var doneCount=waveStudents.filter(function(s){return getTir(sId,s.id).t1!==undefined;}).length;
    var allDone=doneCount===waveStudents.length;
    var wcard=d({background:"#0d1525",border:"1px solid "+(allDone?"#1e4d8c":"#1e3a5f"),borderRadius:"12px",marginBottom:"12px",overflow:"hidden"});
    var whdr=d({background:"#0d1d35",padding:"10px 14px",display:"flex",alignItems:"center",gap:"10px",borderBottom:"1px solid #1e293b"});
    whdr.appendChild(h("span",{style:{color:"#f1f5f9",fontWeight:"700",fontSize:"15px"}},wave.name));
    whdr.appendChild(h("span",{style:{color:"#64748b",fontSize:"12px"}},waveStudents.length+" coureurs"));
    whdr.appendChild(h("span",{style:{marginLeft:"auto",color:allDone&&doneCount>0?"#22c55e":"#f59e0b",fontSize:"12px",fontWeight:"700"}},doneCount+"/"+waveStudents.length+" saisis"));
    wcard.appendChild(whdr);
    var wbody=d({padding:"10px 12px",display:"flex",flexDirection:"column",gap:"6px"});
    waveStudents.forEach(function(s){wbody.appendChild(makeTirRow(s));});
    wcard.appendChild(wbody);
    div.appendChild(wcard);
  });

  // Unassigned
  if(unassigned.length>0){
    var ucard=d({background:"#0d1525",border:"1px dashed #334155",borderRadius:"12px",marginBottom:"12px",overflow:"hidden"});
    var uhdr=d({background:"#080e1a",padding:"10px 14px",display:"flex",alignItems:"center",gap:"10px",borderBottom:"1px solid #1e293b"});
    uhdr.appendChild(h("span",{style:{color:"#64748b",fontWeight:"700",fontSize:"14px"}},"Sans groupe"));
    uhdr.appendChild(h("span",{style:{color:"#475569",fontSize:"12px"}},unassigned.length+" élèves"));
    ucard.appendChild(uhdr);
    var ubody=d({padding:"10px 12px",display:"flex",flexDirection:"column",gap:"6px"});
    unassigned.forEach(function(s){ubody.appendChild(makeTirRow(s));});
    ucard.appendChild(ubody);
    div.appendChild(ucard);
  }

  if(!rd.waves.length&&!unassigned.length){
    div.appendChild(h("div",{style:{textAlign:"center",color:"#475569",padding:"24px"}},"Aucun élève présent"));
  }

  // Class summary
  var allActive=presentStudents;
  var withData=allActive.filter(function(s){return getTir(sId,s.id).t1!==undefined;});
  if(withData.length>0){
    var total=withData.reduce(function(acc,s){var t=0;for(var i=1;i<=session.tirs;i++)t+=getTir(sId,s.id)["t"+i]||0;return acc+t;},0);
    var summ=d({background:"#0a1428",border:"1px solid #1e3a5f",borderRadius:"10px",padding:"12px 16px",display:"flex",gap:"16px",alignItems:"center",flexWrap:"wrap"});
    [[withData.length+"/"+allActive.length,"SAISIS","#60a5fa"],[Math.round(total/(withData.length*session.tirs*5)*100)+"%","MOY. CLASSE","#f59e0b"]].forEach(function(item){
      var dd=d({});dd.appendChild(h("div",{style:{color:"#94a3b8",fontSize:"11px"}},item[1]));dd.appendChild(h("div",{style:{color:item[2],fontWeight:"700",fontSize:"20px"}},item[0]));summ.appendChild(dd);
    });
    div.appendChild(summ);
  }
  return div;
}

function buildWaveCard(wave,session,presentStudents){
  var sId=state.sessionId;
  var students=presentStudents.filter(function(s){return wave.studentIds.indexOf(s.id)>=0;});
  var isManualMode=wave.mode==="manual";
  var allManual=isManualMode&&wave.studentIds.every(function(id){return wave.manualTimes&&wave.manualTimes[id]!==undefined;});
  var allArrived=!isManualMode&&wave.studentIds.length>0&&wave.studentIds.every(function(id){return(wave.arrivals||{})[id];});
  var arrivedCount=isManualMode?Object.keys(wave.manualTimes||{}).length:Object.keys(wave.arrivals||{}).length;
  var status=isManualMode?(allManual?"done":"manual"):(!wave.startedAt?"pending":allArrived?"done":"running");
  var statusBorder={pending:"#1e3a5f",running:"#166534",done:"#1e4d8c",manual:"#7c3aed"}[status];

  var sortedStudents=session.startType==="staggered"?students.slice().sort(function(a,b){return((wave.startOffsets||{})[a.id]||0)-((wave.startOffsets||{})[b.id]||0);}):students;

  var results=[];
  sortedStudents.forEach(function(s){
    var res=getStudentResult(s.id,sId);
    if(res)results.push({student:s,res:res});
  });
  results.sort(function(a,b){return a.res.finalTime-b.res.finalTime;});

  var card=d({background:"#0d1525",border:"2px solid "+statusBorder,borderRadius:"12px",marginBottom:"12px",overflow:"hidden"});

  // Header
  var hdr=d({background:status==="running"?"#0a1e0a":status==="done"?"#0a1630":status==="manual"?"#1a0f2d":"#0d1d35",padding:"12px 16px",display:"flex",alignItems:"center",gap:"10px"});
  var hInfo=d({flex:"1"});
  var ttlRow=d({display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"});
  ttlRow.appendChild(h("span",{style:{color:"#f1f5f9",fontWeight:"700",fontSize:"16px"}},wave.name));
  var statusLabels={pending:"En attente",running:"🔴 EN COURSE",done:"✓ Terminé",manual:"📝 Saisie"};
  ttlRow.appendChild(h("span",{style:{background:statusBorder+"40",color:status==="running"?"#4ade80":status==="done"?"#60a5fa":status==="manual"?"#c084fc":"#64748b",fontSize:"11px",padding:"2px 7px",borderRadius:"4px",fontWeight:"700"}},statusLabels[status]));
  hInfo.appendChild(ttlRow);
  hInfo.appendChild(h("div",{style:{color:"#64748b",fontSize:"12px",marginTop:"2px"}},students.length+" coureur"+(students.length>1?"s":"")+(wave.startedAt?" · Départ "+new Date(wave.startedAt).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit",second:"2-digit"}):"")));
  hdr.appendChild(hInfo);
  // Mode toggle button
  var modeToggleBtn=h("button",{style:{background:isManualMode?"#1a0f2d":"#0f2d4c",border:"1px solid "+(isManualMode?"#7c3aed":"#1e4d8c"),borderRadius:"6px",color:isManualMode?"#c084fc":"#60a5fa",fontSize:"11px",padding:"4px 9px",fontWeight:"700",whiteSpace:"nowrap"},onClick:function(wid,curMode){return function(){
    updateWave(wid,function(w){return Object.assign({},w,{mode:curMode==="manual"?"live":"manual"});});
  };}(wave.id,wave.mode||"live")});
  modeToggleBtn.textContent=isManualMode?"🚀 Passer en live":"📝 Saisie manuelle";
  hdr.appendChild(modeToggleBtn);
  var delBtn=h("button",{style:{background:"transparent",border:"none",color:"#334155",fontSize:"18px",padding:"4px 8px"},onClick:function(wid){return function(){if(confirm("Supprimer ce groupe ?"))deleteWave(wid);};}(wave.id)});
  delBtn.textContent="✕";hdr.appendChild(delBtn);
  card.appendChild(hdr);

  var body=d({padding:"12px 16px"});

  if(isManualMode){
    // Manual entry mode
    body.appendChild(h("div",{style:{color:"#c084fc",fontSize:"12px",marginBottom:"10px"}},"Saisissez les temps bruts (depuis le départ) au format MM:SS"));
    var mlist=d({display:"flex",flexDirection:"column",gap:"8px",marginBottom:"12px"});
    sortedStudents.forEach(function(s){
      var offset=(wave.startOffsets||{})[s.id]||0;
      var existing=wave.manualTimes&&wave.manualTimes[s.id]!==undefined?fmtTime(wave.manualTimes[s.id]):"";
      var row=d({display:"flex",alignItems:"center",gap:"10px",background:"#0a1428",border:"1px solid #1e293b",borderRadius:"8px",padding:"8px 12px"});
      var nameEl=d({flex:"1"});
      nameEl.appendChild(h("div",{style:{color:"#f1f5f9",fontSize:"14px",fontWeight:"600"}},s.nom+" "+s.prenom));
      if(offset>0)nameEl.appendChild(h("div",{style:{color:"#a78bfa",fontSize:"11px"}},"départ +"+fmtTime(offset)));
      row.appendChild(nameEl);
      var inp=h("input",{type:"text",style:{width:"72px",background:"#0f2d4c",border:"1px solid #1e4d8c",borderRadius:"6px",color:"#4ade80",fontFamily:"monospace",fontSize:"16px",textAlign:"center",padding:"6px 4px"},placeholder:"MM:SS",value:existing});
      function saveManualTime(wid,sid,val){
        var secs=parseMMSS(val);
        updateWave(wid,function(w){
          var mt=Object.assign({},w.manualTimes||{});mt[sid]=secs;
          return Object.assign({},w,{manualTimes:mt});
        });
      }
      inp.addEventListener("blur",function(wid,sid){return function(e){saveManualTime(wid,sid,e.target.value);};}(wave.id,s.id));
      inp.addEventListener("keydown",function(wid,sid){return function(e){if(e.key==="Enter"){e.target.blur();saveManualTime(wid,sid,e.target.value);}};}(wave.id,s.id));
      row.appendChild(inp);
      // Show net time if entered
      if(wave.manualTimes&&wave.manualTimes[s.id]!==undefined){
        var net=wave.manualTimes[s.id]-offset;
        var missed=session.penaltyType==="seconds"?calcMissed(s.id,sId)||0:null;
        var final=missed!==null?net+missed*(session.penaltyPerMiss||10):net;
        var tEl=d({textAlign:"right",minWidth:"60px"});
        tEl.appendChild(h("div",{style:{color:"#4ade80",fontFamily:"monospace",fontSize:"13px",fontWeight:"700"}},fmtTime(final)));
        if(missed>0)tEl.appendChild(h("div",{style:{color:"#f87171",fontSize:"10px"}},"+"+missed+"×pen"));
        row.appendChild(tEl);
      }
      mlist.appendChild(row);
    });
    body.appendChild(mlist);
  } else {
    // Live timing mode
    if(wave.startedAt){
      var cb=d({background:"#050c18",padding:"10px 14px",display:"flex",alignItems:"center",gap:"10px",borderBottom:"1px solid #1e293b",marginBottom:"12px",borderRadius:"8px"});
      cb.appendChild(h("span",{style:{fontSize:"16px"}},"⏱"));
      var chrEl=d({fontFamily:"monospace",fontSize:"26px",fontWeight:"700",color:status==="running"?"#4ade80":"#60a5fa",letterSpacing:"2px"});
      chrEl.textContent=fmtTime((Date.now()-wave.startedAt)/1000);
      chrEl.id="chrono-"+wave.id;
      cb.appendChild(chrEl);
      cb.appendChild(d({flex:"1"}));
      cb.appendChild(h("span",{style:{color:"#475569",fontSize:"12px"}},arrivedCount+"/"+students.length+" arrivé"+(arrivedCount>1?"s":"")));
      body.appendChild(cb);
    }

    var slist=d({marginBottom:"12px"});
    slist.id="slist-"+wave.id;
    sortedStudents.forEach(function(s,idx){
      var offset=(wave.startOffsets||{})[s.id]||0;
      if(!wave.startedAt){
        // Pre-start: show order + scheduled offset
        var row=d({display:"flex",alignItems:"center",gap:"10px",padding:"10px 12px",background:idx===0?"#0a1e0a":"#0a1428",border:"1px solid "+(idx===0?"#22c55e30":"#1e293b"),borderRadius:"10px",marginBottom:"6px"});
        if(session.startType!=="mass"){
          var nb=d({width:"28px",height:"28px",borderRadius:"50%",background:idx===0?"#0f2a1a":"#0f2d4c",border:"2px solid "+(idx===0?"#22c55e":"#1e4d8c"),display:"flex",alignItems:"center",justifyContent:"center",color:idx===0?"#22c55e":"#60a5fa",fontWeight:"700",fontSize:"13px",flexShrink:"0"});
          nb.textContent=idx+1;row.appendChild(nb);
        }
        var rInfo=d({flex:"1"});
        rInfo.appendChild(h("span",{style:{color:"#f1f5f9",fontSize:"14px",fontWeight:"600"}},s.nom+" "+s.prenom));
        if(idx===0)rInfo.appendChild(h("div",{style:{color:"#22c55e",fontSize:"11px",marginTop:"2px"}},"🟢 En tête · part en premier"));
        row.appendChild(rInfo);
        row.appendChild(h("span",{style:{color:idx===0?"#22c55e":"#a78bfa",fontFamily:"monospace",fontSize:"14px",fontWeight:"700"}},idx===0?"00:00":"+"+fmtTime(offset)));
        slist.appendChild(row);
      } else {
        // Running: show countdown for not-yet-departed, arrival button for departed
        var arrived=(wave.arrivals||{})[s.id];
        var elapsed=(Date.now()-wave.startedAt)/1000;
        var hasLeft=elapsed>=offset||session.startType==="mass";

function deleteWave(waveId){
  var sId=state.sessionId;
  var rd=state.raceData[sId]||{waves:[]};
  saveRd(sId,Object.assign({},rd,{waves:rd.waves.filter(function(w){return w.id!==waveId;})}));
}

function startWave(waveId){
  var rd=state.raceData[state.sessionId];
  var wv=rd&&rd.waves?rd.waves.find(function(w){return w.id===waveId;}):null;
  if(wv&&wv.startedAt){if(!confirm("Réinitialiser le départ ?"))return;}
  updateWave(waveId,function(w){return Object.assign({},w,{startedAt:Date.now(),arrivals:{}});});
}

function recordArrival(waveId,stId){
  var rd=state.raceData[state.sessionId];
  var wave=rd&&rd.waves?rd.waves.find(function(w){return w.id===waveId;}):null;
  if(!wave)return;
  if((wave.arrivals||{})[stId]){
    if(!confirm("Annuler l'arrivée ?"))return;
    updateWave(waveId,function(w){var a=Object.assign({},w.arrivals);delete a[stId];return Object.assign({},w,{arrivals:a});});
  } else {
    updateWave(waveId,function(w){var a=Object.assign({},w.arrivals||{});a[stId]=Date.now();return Object.assign({},w,{arrivals:a});});
  }
}

function confirmWave(session,ws){

  var wave={id:Date.now().toString(),name:ws.name,studentIds:ws.selected,startOffsets:startOffsets,startedAt:null,arrivals:{},mode:ws.mode||"live",manualTimes:{}};

}

  fileInput.addEventListener("change",function(e){
    var file=e.target.files[0];
    if(!file)return;
    importStatus.textContent="Lecture en cours…";
    importStatus.style.color="#f59e0b";
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var data=new Uint8Array(ev.target.result);
        var workbook=XLSX.read(data,{type:"array"});
        var sheet=workbook.Sheets[workbook.SheetNames[0]];
        var rows=XLSX.utils.sheet_to_json(sheet,{header:1,defval:""});
        if(!rows.length){importStatus.textContent="Fichier vide.";importStatus.style.color="#ef4444";return;}

        // Detect header row: look for a row containing "nom" or "prenom" (case-insensitive)
        var headerIdx=0;
        var colNom=-1,colPrenom=-1,colDs=-1;
        for(var ri=0;ri<Math.min(5,rows.length);ri++){
          var row=rows[ri];
          for(var ci=0;ci<row.length;ci++){
            var cell=String(row[ci]).toLowerCase().trim();
            if(cell==="nom"||cell==="name"||cell==="last name"||cell==="lastname")colNom=ci;
            if(cell==="prénom"||cell==="prenom"||cell==="first name"||cell==="firstname")colPrenom=ci;
            if(cell==="statut"||cell==="status"||cell==="ds"||cell==="type")colDs=ci;
          }
          if(colNom>=0&&colPrenom>=0){headerIdx=ri;break;}
        }

        // If no header found, guess: col 0=Nom, col 1=Prénom, col 2=Statut
        if(colNom<0){colNom=0;}
        if(colPrenom<0){colPrenom=1;}
        if(colDs<0){colDs=2;}
        var startRow=colNom===0&&colPrenom===1?0:headerIdx+1;

        var g=getGroup(CURRENT_GROUP_ID);
        if(!g)return;
        var maxId=g.students.reduce(function(m,s){return s.id>m?s.id:m;},0);
        var added=0,skipped=0;
        for(var i=startRow;i<rows.length;i++){
          var r=rows[i];
          var nom=String(r[colNom]||"").trim();
          var prenom=String(r[colPrenom]||"").trim();
          if(!nom||!prenom){skipped++;continue;}
          // skip header row if strings match known headers
          if(nom.toLowerCase()==="nom"||nom.toLowerCase()==="name"){continue;}
          var dsRaw=String(r[colDs]||"").trim().toUpperCase();
          var ds=dsRaw==="SHN"?"SHN":dsRaw==="AMG"?"AMG":"normal";

          var dup=g.students.find(function(x){return x.nom.toLowerCase()===nom.toLowerCase()&&x.prenom.toLowerCase()===prenom.toLowerCase();});
          if(dup){skipped++;continue;}
          maxId++;
          g.students.push({id:maxId,nom:nom,prenom:prenom,ds:ds});
          added++;

        save("groups",GROUPS);
        importStatus.style.color="#22c55e";

        // Refresh list
        var listEl=document.getElementById("student-list");
        if(listEl){listEl.innerHTML="";rebuildStudentList(listEl);}
      }catch(err){
        importStatus.textContent="Erreur : "+err.message;
        importStatus.style.color="#ef4444";
      }

  var uploadBtn=h("button",{style:{width:"100%",padding:"10px",background:"#0f2d4c",color:"#60a5fa",border:"1px solid #3b82f6",borderRadius:"8px",fontWeight:"700",fontSize:"14px",display:"flex",alignItems:"center",justifyContent:"center",gap:"8px"},onClick:function(){fileInput.click();}});

  modal.appendChild(xlsxBox);

  // ── MANUAL ADD FORM ──

    var nom=nomInp.value.trim(),prenom=prenomInp.value.trim();
    if(!nom||!prenom){alert("Nom et prénom requis.");return;}
    var g2=getGroup(CURRENT_GROUP_ID);

    if(att!==null)chips.appendChild(h("span",{style:{color:att>=80?"#22c55e":att>=50?"#f59e0b":"#ef4444",fontSize:"10px",background:"#0a1428",borderRadius:"3px",padding:"1px 5px"}},att+"% présence"));
    info.appendChild(chips);

}

function buildStudentProfile(student){
  var div=d({});
  var hdr=d({display:"flex",alignItems:"center",gap:"12px",marginBottom:"16px"});
  var back=h("button",{className:"btn-blue",style:{padding:"8px 14px"},onClick:function(){setState({profilId:null});}});back.textContent="← Retour";hdr.appendChild(back);
  var info=d({});
  info.appendChild(h("div",{style:{color:"#f1f5f9",fontWeight:"700",fontSize:"18px"}},student.nom+" "+student.prenom));
  info.appendChild(h("div",{style:{color:"#64748b",fontSize:"12px"}},"#"+student.id+" · "+(student.ds!=="normal"?student.ds:"Étudiant")));
  hdr.appendChild(info);div.appendChild(hdr);

  var raceSessions=SESSIONS.filter(function(s){return(s.type==="race"||s.type==="eval")&&s.distance;});
  var tirSessions=SESSIONS.filter(function(s){return(s.type==="race"||s.type==="eval")&&s.tirs>0;});
  var allSessions=SESSIONS.filter(function(s){return s.type!=="break";});

  var raceRows=raceSessions.map(function(session){
    var r=getStudentResult(student.id,session.id);if(!r)return null;
    var speedKmh=r.finalTime>0?session.distance/r.finalTime*3.6:null;
    var paceSecPerKm=r.finalTime>0?r.finalTime/(session.distance/1000):null;
    return{session:session,r:r,speedKmh:speedKmh,paceSecPerKm:paceSecPerKm};
  }).filter(Boolean);

  var tirRows=tirSessions.map(function(session){
    var tir=(state.shooting[session.id]||{})[student.id];if(!tir||tir.t1===undefined)return null;
    var vals=[],hits=0,done=0;
    for(var i=1;i<=session.tirs;i++){var v=tir["t"+i];vals.push(v!==undefined?v:null);if(v!==null&&v!==undefined){done++;hits+=v;}}
    return{session:session,vals:vals,hits:hits,done:done,pct:done>0?Math.round(hits/(done*5)*100):null};
  }).filter(Boolean);

  // Attendance
  var pastSessions=allSessions.filter(function(s){return s.date<=TODAY;});
  var presentSessions=pastSessions.filter(function(s){
    var st=getStatus(s.id,student.id);return st==="P"||st==="SHN"||st==="AMG"||st==="RET";
  });
  var attRate=pastSessions.length>0?Math.round(presentSessions.length/pastSessions.length*100):null;

  var avgSpeed=raceRows.length>0?raceRows.reduce(function(a,r){return a+(r.speedKmh||0);},0)/raceRows.length:null;
  var avgTir=tirRows.length>0?Math.round(tirRows.reduce(function(a,r){return a+(r.pct||0);},0)/tirRows.length):null;
  var speedTrend=raceRows.length>=2?raceRows[raceRows.length-1].speedKmh-raceRows[0].speedKmh:null;

  // Summary
  var summary=d({display:"flex",gap:"7px",marginBottom:"16px",flexWrap:"wrap"});
  var cards=[];
  if(attRate!==null)cards.push([attRate+"%","PRÉSENCE",attRate>=80?"#22c55e":attRate>=50?"#f59e0b":"#ef4444","📅 "+presentSessions.length+"/"+pastSessions.length+" séances"]);
  if(avgSpeed!==null)cards.push([avgSpeed.toFixed(1),"VITESSE MOY","#60a5fa","km/h"+(speedTrend!==null?" · "+(speedTrend>=0?"↑+":"↓")+Math.abs(speedTrend).toFixed(1):"")]);
  if(avgTir!==null)cards.push([avgTir+"%","PRÉCISION TIR",avgTir>=60?"#22c55e":avgTir>=40?"#f59e0b":"#ef4444","moyenne tir"]);
  cards.push([raceRows.length,"COURSES","#94a3b8","chronométrées"]);
  cards.forEach(function(item){
    var dd=d({background:"#0f1e2d",border:"1px solid #1e4d8c",borderRadius:"8px",padding:"9px 12px",textAlign:"center",flex:"1",minWidth:"80px"});
    dd.appendChild(h("div",{style:{color:"#64748b",fontSize:"10px",marginBottom:"2px"}},item[1]));
    dd.appendChild(h("div",{style:{color:item[2],fontWeight:"700",fontSize:"20px"}},item[0]));
    dd.appendChild(h("div",{style:{color:"#475569",fontSize:"10px"}},item[3]));
    summary.appendChild(dd);
  });
  div.appendChild(summary);

  // Attendance breakdown
  if(pastSessions.length>0){
    var attSect=d({background:"#0d1525",border:"1px solid #1e3a5f",borderRadius:"10px",padding:"12px 14px",marginBottom:"14px"});
    attSect.appendChild(h("div",{style:{color:"#f1f5f9",fontWeight:"700",fontSize:"13px",marginBottom:"8px"}},"📅 Présence détaillée"));
    var attBar=d({display:"flex",gap:"4px",flexWrap:"wrap"});
    allSessions.forEach(function(s){
      if(s.type==="break"){
        var sp=d({width:"8px",height:"28px",borderRadius:"3px",background:"#1e293b",opacity:"0.3"});attBar.appendChild(sp);return;
      }
      var st=getStatus(s.id,student.id)||(student.ds!=="normal"?student.ds:"");
      var isFuture=s.date>TODAY;
      var color=isFuture?"#1e293b":st==="P"||st==="SHN"||st==="AMG"?"#22c55e":st==="RET"?"#f97316":st==="ABS"?"#ef4444":"#334155";
      var dot=d({width:"26px",height:"28px",borderRadius:"4px",background:color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px",fontWeight:"700",color:"#000",opacity:isFuture?"0.3":"1"});
      dot.title=s.label+" ("+fmt(s.date)+")";
      dot.textContent=s.label.replace("S","").replace(" –","").split("")[0]||"?";
      attBar.appendChild(dot);
    });
    attSect.appendChild(attBar);
    var legend=d({display:"flex",gap:"8px",marginTop:"8px",flexWrap:"wrap"});
    [["#22c55e","Présent"],["#f97316","Retard"],["#ef4444","Absent"],["#334155","Non saisi"]].forEach(function(item){
      var l=d({display:"flex",alignItems:"center",gap:"4px"});
      var dot=d({width:"10px",height:"10px",borderRadius:"2px",background:item[0],flexShrink:"0"});
      l.appendChild(dot);l.appendChild(h("span",{style:{color:"#64748b",fontSize:"10px"}},item[1]));
      legend.appendChild(l);
    });
    attSect.appendChild(legend);
    div.appendChild(attSect);
  }

  // View switcher
  var switcher=d({display:"flex",gap:"8px",marginBottom:"12px"});
  var currentView=state._profilView||"course";
  [["course","🏁 Courses ("+raceRows.length+")"],["tir","🎯 Tir ("+tirRows.length+")"]].forEach(function(item){
    var btn=h("button",{style:{flex:"1",padding:"9px 6px",borderRadius:"8px",border:"2px solid "+(currentView===item[0]?"#3b82f6":"#1e293b"),background:currentView===item[0]?"#0f2d4c":"#0a1428",color:currentView===item[0]?"#60a5fa":"#64748b",fontWeight:"700",fontSize:"13px"},onClick:function(id){return function(){state._profilView=id;render();};}(item[0])});
    btn.textContent=item[1];switcher.appendChild(btn);
  });
  div.appendChild(switcher);

  if(currentView==="course"){
    if(!raceRows.length)div.appendChild(h("div",{style:{textAlign:"center",color:"#475569",padding:"24px"}},"Aucune course enregistrée"));
    else{
      var list=d({display:"flex",flexDirection:"column",gap:"8px"});
      raceRows.forEach(function(item){
        var session=item.session,r=item.r,speedKmh=item.speedKmh,paceSecPerKm=item.paceSecPerKm;
        var pm=paceSecPerKm?Math.floor(paceSecPerKm/60):null,ps=paceSecPerKm?Math.round(paceSecPerKm%60):null;
        var card=d({background:"#0d1525",border:"1px solid #1e3a5f",borderRadius:"10px",padding:"12px 14px"});
        var hd=d({display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px"});
        hd.appendChild(h("span",{style:{fontSize:"18px"}},session.icon));
        var si=d({flex:"1"});si.appendChild(h("div",{style:{color:"#f1f5f9",fontWeight:"700",fontSize:"14px"}},session.label));si.appendChild(h("div",{style:{color:"#64748b",fontSize:"11px"}},fmt(session.date)+" · "+(session.distance/1000).toFixed(2)+" km"));hd.appendChild(si);
        card.appendChild(hd);
        var metrics=d({display:"flex",gap:"7px",flexWrap:"wrap"});
        [[fmtTime(r.finalTime),"TEMPS NET","#4ade80"],[speedKmh?speedKmh.toFixed(1):"—","VITESSE","#60a5fa"],[pm!==null?pm+":"+pad(ps):"—","ALLURE","#a78bfa"]].forEach(function(m){
          var dd=d({background:"#0a1428",borderRadius:"8px",padding:"8px 10px",flex:"1",minWidth:"80px"});
          dd.appendChild(h("div",{style:{color:"#64748b",fontSize:"10px"}},m[1]));
          dd.appendChild(h("div",{style:{color:m[2],fontFamily:"monospace",fontWeight:"700",fontSize:"17px"}},m[0]));
          metrics.appendChild(dd);
        });
        card.appendChild(metrics);list.appendChild(card);
      });
      div.appendChild(list);
    }
  }

  if(currentView==="tir"){
    if(!tirRows.length)div.appendChild(h("div",{style:{textAlign:"center",color:"#475569",padding:"24px"}},"Aucun résultat de tir"));
    else{
      var list2=d({display:"flex",flexDirection:"column",gap:"8px"});
      tirRows.forEach(function(item){
        var session=item.session,vals=item.vals,hits=item.hits,done=item.done,pct=item.pct;
        var card=d({background:"#0d1525",border:"1px solid "+(pct>=60?"#22c55e30":pct>=40?"#f59e0b30":"#ef444430"),borderRadius:"10px",padding:"12px 14px"});
        var hd=d({display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"});
        hd.appendChild(h("span",{style:{fontSize:"18px"}},session.icon));
        var si=d({flex:"1"});si.appendChild(h("div",{style:{color:"#f1f5f9",fontWeight:"700",fontSize:"14px"}},session.label));si.appendChild(h("div",{style:{color:"#64748b",fontSize:"11px"}},fmt(session.date)));hd.appendChild(si);
        var sc=d({textAlign:"right"});sc.appendChild(h("div",{style:{color:pct>=60?"#22c55e":pct>=40?"#f59e0b":"#ef4444",fontWeight:"700",fontSize:"22px"}},pct+"%"));sc.appendChild(h("div",{style:{color:"#64748b",fontSize:"11px"}},hits+"/"+(done*5)));hd.appendChild(sc);
        card.appendChild(hd);
        var pb=d({background:"#0a1428",borderRadius:"6px",height:"8px",overflow:"hidden",marginBottom:"8px"});
        var pf=d({height:"100%",borderRadius:"6px",background:pct>=60?"#22c55e":pct>=40?"#f59e0b":"#ef4444",width:pct+"%"});pb.appendChild(pf);card.appendChild(pb);
        var chips=d({display:"flex",gap:"6px",flexWrap:"wrap"});
        vals.forEach(function(v,i){
          var lbl=session.tirLabels[i];
          var c=v===5?"#22c55e":v>=3?"#f59e0b":v!==null?"#ef4444":"#334155";
          var chip=d({background:"#0a1428",border:"1px solid "+c+"40",borderRadius:"6px",padding:"4px 7px",textAlign:"center",minWidth:"44px"});
          chip.appendChild(h("div",{style:{color:"#64748b",fontSize:"10px"}},(lbl==="C"?"🔵":"🟣")+" T"+(i+1)));
          chip.appendChild(h("div",{style:{color:c,fontWeight:"700",fontSize:"14px"}},v!==null?v+"/5":"—"));
          var dots=d({display:"flex",gap:"2px",justifyContent:"center",marginTop:"2px"});
          if(v!==null){for(var j=0;j<5;j++){var dot=d({width:"6px",height:"6px",borderRadius:"50%",background:j<v?"#22c55e":"#1e293b"});dots.appendChild(dot);}}
          chip.appendChild(dots);chips.appendChild(chip);
        });
        card.appendChild(chips);list2.appendChild(card);
      });
      div.appendChild(list2);
    }
  }
  return div;
}

// Migration : anciens keys plats → keys préfixés par groupe g1
function migrateOldData(){
  var oldKeys=["att","sho","raceData","warmup","notes"];
  var needsMigration=false;
  oldKeys.forEach(function(k){
    if(localStorage.getItem(k)!==null&&localStorage.getItem(k+"_g1")===null)needsMigration=true;
  });
  if(!needsMigration)return;
  oldKeys.forEach(function(k){
    var val=localStorage.getItem(k);
    if(val!==null&&localStorage.getItem(k+"_g1")===null){
      localStorage.setItem(k+"_g1",val);
      console.log("Migrated "+k+" → "+k+"_g1");
    }
  });
  // Migrate students list into group g1 if not already done
  var oldStudents=localStorage.getItem("students");
  if(oldStudents){
    var parsed=null;
    try{parsed=JSON.parse(oldStudents);}catch(e){}
    if(parsed&&parsed.length>0){
      var groups=load("groups",DEFAULT_GROUPS);
      var g1=groups.find(function(g){return g.id==="g1";});
      if(g1){
        // Only overwrite if still using default students (check by count)
        if(g1.students.length===DEFAULT_GROUPS[0].students.length){
          g1.students=parsed;
          save("groups",groups);
          GROUPS=groups;
          console.log("Migrated students → g1 ("+parsed.length+" élèves)");
        }
      }
    }
  }
}

migrateOldData();

// Inject missing groups from DEFAULT_GROUPS into saved GROUPS
(function(){
  var saved=load("groups",null);
  if(!saved)return; // first launch, DEFAULT_GROUPS used directly
  var changed=false;
  DEFAULT_GROUPS.forEach(function(dg){
    if(!saved.find(function(g){return g.id===dg.id;})){
      saved.push(dg);
      changed=true;
      console.log("Injected missing group: "+dg.id);
    }
  });
  if(changed){save("groups",saved);GROUPS=saved;}
})();

function switchGroup(gid){
  CURRENT_GROUP_ID=gid;
  var g=getGroup(gid);
  if(!g)return;
  state.attendance=load("att_"+gid,{});
  state.shooting=load("sho_"+gid,{});
  state.raceData=load("raceData_"+gid,{});
  state.warmup=load("warmup_"+gid,{});
  state.notes=load("notes_"+gid,{});
  state.tab="appel";
  state.sessionId=findCurrentSession();
  state.profilId=null;
  state.tirModal=null;
  state.waveSetup=null;
  state.expandedSess=null;
  state.courseSubTab="course";
  render();
}
