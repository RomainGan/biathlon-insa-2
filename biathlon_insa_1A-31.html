// ─── HELPERS ─────────────────────────────────────────────────────────────────
function fmt(d){var p=d.split("-");return p[2]+"/"+p[1]+"/"+p[0];}
function fmtShort(d){var p=d.split("-");return p[2]+"/"+p[1];}
function fmtTime(s){
  if(s===null||s===undefined||isNaN(s)||s<0)return"--:--";
  var abs=Math.round(s),m=Math.floor(abs/60),hh=Math.floor(m/60);
  if(hh>0)return hh+":"+pad(m%60)+":"+pad(abs%60);
  return pad(m)+":"+pad(abs%60);
}
function pad(n){return n<10?"0"+n:String(n);}
function parseMMSS(str){
  if(!str||!str.trim())return 0;
  var p=str.trim().split(":");
  return p.length===2?(parseInt(p[0])||0)*60+(parseInt(p[1])||0):(parseFloat(str)||0);
}
function flatArr(arr){var r=[];(function f(a){for(var i=0;i<a.length;i++){if(Array.isArray(a[i]))f(a[i]);else r.push(a[i]);}})(arr);return r;}
function h(tag,attrs){
  var el=document.createElement(tag);
  var children=Array.prototype.slice.call(arguments,2);
  if(attrs){
    var keys=Object.keys(attrs);
    for(var ki=0;ki<keys.length;ki++){
      var k=keys[ki],v=attrs[k];
      if(k==="style"&&typeof v==="object"){var sk=Object.keys(v);for(var si=0;si<sk.length;si++)el.style[sk[si]]=v[sk[si]];}
      else if(k==="className")el.className=v;
      else if(k.slice(0,2)==="on")el.addEventListener(k.slice(2).toLowerCase(),v);
      else el.setAttribute(k,v);
    }
  }
  flatArr(children).forEach(function(c){
    if(c!==null&&c!==undefined&&c!==false)
      el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);
  });
  return el;
}
function d(style){var el=document.createElement("div");if(style){var sk=Object.keys(style);for(var i=0;i<sk.length;i++)el.style[sk[i]]=style[sk[i]];}return el;}
function txt(s){return document.createTextNode(s);}

function findCurrentSession(){

  for(var i=0;i<rs.length;i++){if(rs[i].date<=TODAY)best=rs[i];}
  return best.id;
}

function setState(patch){
  var keys=Object.keys(patch);
  for(var i=0;i<keys.length;i++)state[keys[i]]=patch[keys[i]];
  render();
}
function flash(){setState({saveFlash:true});setTimeout(function(){setState({saveFlash:false});},700);}

// ─── DATA HELPERS ────────────────────────────────────────────────────────────
function getStatus(sId,stId){return((state.attendance[sId]||{})[stId])||"";}
function getTir(sId,stId){return((state.shooting[sId]||{})[stId])||{};}

function cycleStatus(stId){
  var st=getStudents().find(function(s){return s.id===stId;});
  var cycle=st.ds==="SHN"?["SHN","P","ABS","RET"]:st.ds==="AMG"?["AMG","P","ABS","RET"]:["","P","ABS","RET"];
  var cur=getStatus(state.sessionId,stId);
  var idx=cycle.indexOf(cur);
  var next=cycle[(idx+1)%cycle.length];
  var att=Object.assign({},state.attendance);
  att[state.sessionId]=Object.assign({},att[state.sessionId]||{});
  att[state.sessionId][stId]=next;
  save("att_"+CURRENT_GROUP_ID,att);
  setState({attendance:att});
  flash();
}

function setTir(stId,key,val){
  var sId=state.sessionId;
  var sho=Object.assign({},state.shooting);
  sho[sId]=Object.assign({},sho[sId]||{});
  sho[sId][stId]=Object.assign({},sho[sId][stId]||{});
  sho[sId][stId][key]=val;
  save("sho_"+CURRENT_GROUP_ID,sho);
  setState({shooting:sho});
}

function calcMissed(stId,sId){
  var session=SESSIONS.find(function(s){return s.id===sId;});
  if(!session||!session.tirs)return null;
  var tir=getTir(sId,stId);
  var missed=0,hasData=false;
  for(var i=1;i<=session.tirs;i++){var v=tir["t"+i];if(v!==null&&v!==undefined){missed+=5-v;hasData=true;}}
  return hasData?missed:null;
}

function getStudentResult(stId,sId){
  var session=SESSIONS.find(function(s){return s.id===sId;});
  var rd=state.raceData[sId];
  if(!rd||!session)return null;
  for(var wi=0;wi<rd.waves.length;wi++){
    var wave=rd.waves[wi];
    if(wave.studentIds.indexOf(stId)<0)continue;
    // Manual entry mode
    if(wave.manualTimes&&wave.manualTimes[stId]!==undefined){
      var rawSecs=wave.manualTimes[stId];
      var offset=(wave.startOffsets||{})[stId]||0;
      var runSecs=rawSecs-offset;
      if(session.penaltyType==="seconds"){
        var missed=calcMissed(stId,sId)||0;
        return{rawTime:rawSecs,runSecs:runSecs,offset:offset,missed:missed,finalTime:runSecs+missed*(session.penaltyPerMiss||10),manual:true};
      }
      return{rawTime:rawSecs,runSecs:runSecs,offset:offset,missed:null,finalTime:session.startType==="pursuit"?rawSecs:runSecs,manual:true};
    }
    // Live timing
    var arrival=(wave.arrivals||{})[stId];
    if(!arrival||!wave.startedAt)return null;
    var offset2=(wave.startOffsets||{})[stId]||0;
    var runSecs2=(arrival-wave.startedAt)/1000-offset2;
    if(session.penaltyType==="seconds"){
      var missed2=calcMissed(stId,sId)||0;
      return{rawTime:runSecs2+offset2,runSecs:runSecs2,offset:offset2,missed:missed2,finalTime:runSecs2+missed2*(session.penaltyPerMiss||10),manual:false};
    }
    return{rawTime:runSecs2+offset2,runSecs:runSecs2,offset:offset2,missed:null,finalTime:session.startType==="pursuit"?runSecs2+offset2:runSecs2,manual:false};
  }
  return null;
}

function getSessionRanking(sId){
  var rd=state.raceData[sId];
  if(!rd)return[];
  var rows=[];
  for(var wi=0;wi<rd.waves.length;wi++){
    var wave=rd.waves[wi];
    if(wave.isRelay){
      // For relay waves, rank by team total time
      var legTimes=wave.legTimes||{};
      var total=0,allDone=true;
      wave.studentIds.forEach(function(id){if(legTimes[id]!==undefined)total+=legTimes[id];else allDone=false;});
      if(allDone&&wave.studentIds.length>0){
        // Push team representative (first member) with team total
        rows.push({studentId:wave.studentIds[0],finalTime:total,runSecs:total,isTeam:true,teamName:wave.name,teamIds:wave.studentIds});
      }
    } else {
      for(var si=0;si<wave.studentIds.length;si++){
        var sid=wave.studentIds[si];
        var r=getStudentResult(sid,sId);
        if(r)rows.push(Object.assign({studentId:sid},r));
      }
    }
  }
  return rows.sort(function(a,b){return a.finalTime-b.finalTime;});
}

function saveRd(sId,rd){
  var raceData=Object.assign({},state.raceData);
  raceData[sId]=rd;
  save("raceData_"+CURRENT_GROUP_ID,raceData);
  setState({raceData:raceData});
  flash();
}

function updateWave(waveId,fn){
  var sId=state.sessionId;
  var rd=state.raceData[sId]||{waves:[]};
  var waves=rd.waves.map(function(w){return w.id===waveId?fn(w):w;});
  saveRd(sId,Object.assign({},rd,{waves:waves}));
}

function getAttendanceRate(stId){
  var raceSess=SESSIONS.filter(function(s){return s.type!=="break";});
  var past=raceSess.filter(function(s){return s.date<=TODAY;});
  if(!past.length)return null;
  var present=past.filter(function(s){
    var st=getStatus(s.id,stId);
    return st==="P"||st==="SHN"||st==="AMG"||st==="RET";
  });
  return Math.round(present.length/past.length*100);
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  var root=document.getElementById("root");
  root.innerHTML="";
  root.appendChild(buildApp());
  startChronos();
}

function startChronos(){
  var ids=Object.keys(chronoIntervals);
  for(var i=0;i<ids.length;i++)clearInterval(chronoIntervals[ids[i]]);
  chronoIntervals={};
  var sId=state.sessionId;
  var rd=state.raceData[sId];
  if(!rd||state.tab!=="course"||state.courseSubTab!=="course")return;
  rd.waves.forEach(function(wave){
    if(!wave.startedAt)return;
    var allDone=wave.studentIds.every(function(id){return(wave.arrivals||{})[id];});
    if(allDone)return;
    var id=setInterval(function(){
      var elapsed=(Date.now()-wave.startedAt)/1000;
      // Update main chrono
      var el2=document.getElementById("chrono-"+wave.id);
      if(el2)el2.textContent=fmtTime(elapsed);
      // Update per-student countdowns
      wave.studentIds.forEach(function(sid){
        var cntEl=document.getElementById("cnt-"+wave.id+"-"+sid);
        if(!cntEl)return;
        var offset=(wave.startOffsets||{})[sid]||0;
        var timeUntil=offset-elapsed;
        if(timeUntil<=0){
          // Already left — remove countdown, let next render handle it
          // Trigger re-render only if just crossed threshold
          if(cntEl.dataset.wasActive){
            delete cntEl.dataset.wasActive;
            render();
          }
          return;
        }
        var cntNum=Math.ceil(timeUntil);
        cntEl.dataset.wasActive="1";
        if(timeUntil<=5){
          cntEl.style.fontSize="28px";
          cntEl.style.color=cntNum<=3?"#ef4444":"#f59e0b";
          cntEl.style.fontWeight="900";
          cntEl.textContent=cntNum<=0?"GO !":cntNum;
          // Flash border on parent button
          var btn=cntEl.closest?cntEl.closest("button"):null;
          if(btn&&cntNum<=3){btn.style.borderColor="#ef4444";btn.style.background="#1e0a0a";}
        } else {
          cntEl.style.fontSize="13px";
          cntEl.style.color="#a78bfa";
          cntEl.style.fontWeight="700";
          cntEl.textContent="+"+fmtTime(offset);
        }
      });
    },100);
    chronoIntervals[wave.id]=id;
  });
}

// buildBalancedTeams(ids, nTeams, legsPerTeam, nShort, refSessions)
// nShort = nb d'équipes avec (legsPerTeam-1) membres (besoin d'un doubleur)
// nFull  = nb d'équipes avec legsPerTeam membres (pas de doubleur)
// Toutes les équipes ont le même nombre de LEGS après ajout du doubleur.
function buildBalancedTeams(presentIds, nTeams, legsPerTeam, nShort, refSessions){
  var nFull=nTeams-(nShort||0);

  // ── Score par rang normalisé 0→1 sur toutes les sessions ──
  var scoreMap={};
  presentIds.forEach(function(id){scoreMap[id]=0.5;});
  refSessions.forEach(function(sId){
    var res=[];
    presentIds.forEach(function(id){
      var r=getStudentResult(id,sId);
      if(r&&r.finalTime)res.push({id:id,t:r.finalTime});
    });
    if(!res.length)return;
    res.sort(function(a,b){return a.t-b.t;});
    res.forEach(function(r,i){scoreMap[r.id]=res.length>1?i/(res.length-1):0;});
  });

  var scored=presentIds.map(function(id){return{id:id,score:scoreMap[id]};});

  // Taille max par équipe : les nFull premières ont legsPerTeam, les nShort suivantes ont legsPerTeam-1
  function maxSize(ti){return ti<nFull?legsPerTeam:(legsPerTeam-1);}

  // Score moyen d'une équipe
  function teamAvg(t){return t.ids.length?t.totalScore/t.ids.length:0;}

  function gap(ts){
    var avgs=ts.map(teamAvg);
    return Math.max.apply(null,avgs)-Math.min.apply(null,avgs);
  }
  function gapPct(ts){
    var avgs=ts.map(teamAvg);
    var mx=Math.max.apply(null,avgs),mn=Math.min.apply(null,avgs);
    var mid=(mx+mn)/2;
    return mid>0?(mx-mn)/mid*100:0;
  }
  function cloneTeams(ts){return ts.map(function(t){return{ids:t.ids.slice(),totalScore:t.totalScore};});}

  function buildFromOrder(order){
    var ts=[];
    for(var i=0;i<nTeams;i++)ts.push({ids:[],totalScore:0});
    order.forEach(function(s){
      var best=null,bestAvg=Infinity;
      ts.forEach(function(t,ti){
        if(t.ids.length>=maxSize(ti))return;
        var avg=teamAvg(t);
        if(avg<bestAvg){bestAvg=avg;best=ti;}
      });
      if(best===null)ts.forEach(function(t,ti){var avg=teamAvg(t);if(avg<bestAvg){bestAvg=avg;best=ti;}});
      ts[best].ids.push(s.id);
      ts[best].totalScore+=s.score;
    });
    return ts;
  }

  function localSearch(ts){
    var improved=true,iter=0;
    while(improved&&iter<500){
      improved=false;iter++;
      var g=gap(ts);
      outer:
      for(var ti=0;ti<ts.length;ti++){
        for(var tj=ti+1;tj<ts.length;tj++){
          for(var ai=0;ai<ts[ti].ids.length;ai++){
            for(var bi=0;bi<ts[tj].ids.length;bi++){
              // Vérifier compatibilité de taille après échange
              var newSzI=ts[ti].ids.length; // même taille
              var newSzJ=ts[tj].ids.length;
              if(newSzI>maxSize(ti)||newSzJ>maxSize(tj))continue;
              var sA=scoreMap[ts[ti].ids[ai]]||0;
              var sB=scoreMap[ts[tj].ids[bi]]||0;
              ts[ti].totalScore+=sB-sA;
              ts[tj].totalScore+=sA-sB;
              var ng=gap(ts);
              if(ng<g-0.00001){
                var tmp=ts[ti].ids[ai];ts[ti].ids[ai]=ts[tj].ids[bi];ts[tj].ids[bi]=tmp;
                g=ng;improved=true;break outer;
              } else {
                ts[ti].totalScore+=sA-sB;ts[tj].totalScore+=sB-sA;
              }
            }
          }
        }
      }
    }
    return ts;
  }

  function shuffle(arr){
    var a=arr.slice();
    for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}
    return a;
  }

  var bestTeams=null,bestGap=Infinity;
  [scored.slice().sort(function(a,b){return a.score-b.score;}),
   scored.slice().sort(function(a,b){return b.score-a.score;})
  ].forEach(function(order){
    var ts=localSearch(buildFromOrder(order));
    var gp=gapPct(ts);
    if(gp<bestGap){bestGap=gp;bestTeams=cloneTeams(ts);}
  });
  for(var attempt=0;attempt<78;attempt++){
    if(bestGap<2)break;
    var ts2=localSearch(buildFromOrder(shuffle(scored)));
    var gp2=gapPct(ts2);
    if(gp2<bestGap){bestGap=gp2;bestTeams=cloneTeams(ts2);}
  }
  return bestTeams;
}

// Get all past race sessions with results for a group
function getPastRaceSessions(){
  return SESSIONS.filter(function(s){
    return(s.type==="race"||s.type==="eval")&&s.date<=TODAY&&state.raceData[s.id]&&getSessionRanking(s.id).length>0;
  });
}

function buildTirSection(session){
  var sId=state.sessionId;
  var div=d({});
  if(!session.tirs){
    var box=d({background:"#0d1525",border:"1px solid #1e293b",borderRadius:"10px",padding:"24px",textAlign:"center",color:"#475569"});
    box.appendChild(h("div",{style:{fontSize:"36px",marginBottom:"8px"}},"🎿"));
    box.appendChild(h("div",{style:{fontSize:"14px"}},"Pas de tir pour "+session.label));
    div.appendChild(box);return div;
  }
  // Tir structure header + sort toggle
  var bar=d({background:"#0d1525",border:"1px solid #1e3a5f",borderRadius:"10px",padding:"10px 14px",marginBottom:"12px",display:"flex",flexWrap:"wrap",gap:"8px",alignItems:"center"});
  session.tirLabels.forEach(function(lbl,i){
    bar.appendChild(h("span",{style:{background:lbl==="C"?"#0f2d4c":"#1c1040",color:lbl==="C"?"#60a5fa":"#a78bfa",border:"1px solid "+(lbl==="C"?"#3b82f6":"#7c3aed"),borderRadius:"6px",padding:"4px 10px",fontSize:"12px",fontWeight:"700"}},"T"+(i+1)+" "+(lbl==="C"?"🔵 Couché":"🟣 Debout")));
  });
  bar.appendChild(h("span",{style:{color:"#64748b",fontSize:"12px"}},"5 balles/tir"));
  // Sort toggle
  var tirSort=state._tirSort||"wave";
  var sortBtn=h("button",{style:{marginLeft:"auto",background:tirSort==="alpha"?"#0f2d4c":"#1e293b",border:"1px solid "+(tirSort==="alpha"?"#3b82f6":"#334155"),borderRadius:"6px",color:tirSort==="alpha"?"#60a5fa":"#64748b",fontSize:"11px",fontWeight:"700",padding:"4px 10px"},onClick:function(){state._tirSort=tirSort==="alpha"?"wave":"alpha";setState({});}});
  sortBtn.textContent=tirSort==="alpha"?"🔤 Alpha":"🏁 Ordre course";
  bar.appendChild(sortBtn);
  div.appendChild(bar);

  var rd=state.raceData[sId]||{waves:[]};
  var presentStudents=getStudents().filter(function(s){var st=getStatus(sId,s.id)||(s.ds!=="normal"?s.ds:"");return st!=="ABS";});
  var assignedIds={};
  rd.waves.forEach(function(w){w.studentIds.forEach(function(id){assignedIds[id]=true;});});
  var unassigned=presentStudents.filter(function(s){return!assignedIds[s.id];});

  function makeTirRow(s){
    var tir=getTir(sId,s.id);
    var vals=[],hits=0,done=0;
    for(var i=1;i<=session.tirs;i++){var v=tir["t"+i];vals.push(v!==undefined?v:null);if(v!==null&&v!==undefined){done++;hits+=v;}}
    var pct=done>0?Math.round(hits/(done*5)*100):null;
    var btn=h("button",{style:{background:"#0a1428",border:"1px solid "+(done>0?"#1e4d8c":"#1e293b"),borderRadius:"10px",padding:"10px 12px",display:"flex",alignItems:"center",gap:"10px",width:"100%",textAlign:"left"},onClick:function(id){return function(){setState({tirModal:id});};}(s.id)});
    var info=d({flex:"1"});
    var nm=d({});nm.appendChild(h("span",{style:{color:"#f1f5f9",fontWeight:"700",fontSize:"14px"}},s.nom+" "));nm.appendChild(h("span",{style:{color:"#94a3b8",fontSize:"13px"}},s.prenom));info.appendChild(nm);
    if(done>0){
      var chips=d({display:"flex",gap:"5px",marginTop:"4px",flexWrap:"wrap"});
      vals.forEach(function(v,i){chips.appendChild(h("span",{style:{fontSize:"12px",color:v===null?"#334155":v>=4?"#22c55e":v>=2?"#f59e0b":"#ef4444",background:"#0d1525",border:"1px solid #1e293b",borderRadius:"4px",padding:"2px 6px",fontWeight:"600"}},"T"+(i+1)+":"+(v===null?"—":v+"/5")));});
      info.appendChild(chips);
    }
    var score=d({textAlign:"right",minWidth:"52px"});
    if(done===0)score.appendChild(h("span",{style:{color:"#334155",fontSize:"12px"}},"—"));
    else{score.appendChild(h("div",{style:{color:pct>=60?"#22c55e":pct>=33?"#f59e0b":"#ef4444",fontWeight:"700",fontSize:"18px"}},hits+"/"+(done*5)));score.appendChild(h("div",{style:{color:"#64748b",fontSize:"11px"}},pct+"%"));}
    btn.appendChild(info);btn.appendChild(score);btn.appendChild(h("span",{style:{color:"#334155",fontSize:"16px"}},"›"));
    return btn;
  }

  // Render by wave groups
  rd.waves.forEach(function(wave){
    var waveStudents=presentStudents.filter(function(s){return wave.studentIds.indexOf(s.id)>=0;});
    if(!waveStudents.length)return;
    // Apply sort
    if(tirSort==="alpha"){
      waveStudents=waveStudents.slice().sort(function(a,b){return a.nom.localeCompare(b.nom,"fr");});
    } else {
      // Race order: follow wave.studentIds order
      waveStudents=wave.studentIds.map(function(id){return presentStudents.find(function(s){return s.id===id;});}).filter(Boolean);
    }
    var doneCount=waveStudents.filter(function(s){return getTir(sId,s.id).t1!==undefined;}).length;
    var allDone=doneCount===waveStudents.length;
    var wcard=d({background:"#0d1525",border:"1px solid "+(allDone?"#1e4d8c":"#1e3a5f"),borderRadius:"12px",marginBottom:"12px",overflow:"hidden"});
    var whdr=d({background:"#0d1d35",padding:"10px 14px",display:"flex",alignItems:"center",gap:"10px",borderBottom:"1px solid #1e293b"});

// ─── EXPORT CSV ──────────────────────────────────────────────────────────────
function exportSessionCSV(session){
  var sId=session.id;
  var rd=state.raceData[sId]||{waves:[]};
  var shoData=load("sho_"+CURRENT_GROUP_ID,{});
  var sessionSho=shoData[sId]||{};
  var nTirs=session.tirs||0;
  var isPenSec=session.penaltyType==="seconds";
  var penVal=session.penaltyPerMiss||0;
  var sep=";";

  function secsToMMSS(s){
    if(s===null||s===undefined||isNaN(s))return "";
    var abs=Math.abs(Math.round(s));
    var mm=Math.floor(abs/60);var ss=abs%60;
    return (s<0?"-":"")+(mm<10?"0":"")+mm+":"+(ss<10?"0":"")+ss;
  }

  function buildRowForStudent(sid,wave,waveRank,waveRanked,waveBest){
    var st=getStudents().find(function(x){return x.id===sid;});
    if(!st)return null;
    var offsets=wave.startOffsets||{};
    var offset=offsets[sid]||0;
    var brut=null;
    if(wave.mode==="manual"&&wave.manualTimes&&wave.manualTimes[sid]!==undefined){
      brut=wave.manualTimes[sid];
    } else if(wave.arrivals&&wave.arrivals[sid]&&wave.startedAt){
      brut=(wave.arrivals[sid]-wave.startedAt)/1000;
    }
    var net=brut!==null?brut-offset:null;
    var tirs=sessionSho[sid]||{};
    var totalOk=0;
    for(var i=1;i<=nTirs;i++)totalOk+=(tirs["t"+i]||0);
    var totalRate=nTirs*5-totalOk;
    var penSecs=isPenSec?(totalRate*penVal):0;
    var finalTime=net!==null?net+penSecs:null;
    var rank=waveRanked.findIndex(function(x){return x.sid===sid;})+1;
    var ecart=finalTime!==null&&waveBest!==null?finalTime-waveBest:null;
    var tirCols=[];
    for(var t=1;t<=nTirs;t++){tirCols.push(tirs["t"+t]!==undefined?tirs["t"+t]:"");tirCols.push(5);}
    return {
      st:st,offset:offset,brut:brut,net:net,finalTime:finalTime,
      tirs:tirs,totalOk:totalOk,totalRate:totalRate,penSecs:penSecs,
      rank:rank,ecart:ecart,tirCols:tirCols
    };
  }

  // Header row (shared)
  var tirHeaders=[];
  for(var t=1;t<=nTirs;t++){tirHeaders.push("Tir "+t);tirHeaders.push("/5");}
  var hdr=["N°","Coureur","Prénom","Temps Départ"].concat(tirHeaders)
    .concat(["Total Réussi","Total Raté",isPenSec?"Pénalité (s)":"Pénalité (m)","Temps Arrivée","Temps Net","Temps Final","Classement groupe","Écart 1er groupe","Classement général","Écart 1er général"]);

  // Build lines
  var lines=[];
  lines.push(session.icon+" "+session.label+" — "+session.date);
  lines.push("");

  // ── Per-wave blocks ──
  // First pass: compute all rows to get overall ranking
  var allResults=[];
  rd.waves.forEach(function(wave){
    var waveRows=[];
    wave.studentIds.forEach(function(sid){
      var st=getStudents().find(function(x){return x.id===sid;});
      if(!st)return;
      var offsets=wave.startOffsets||{};
      var offset=offsets[sid]||0;
      var brut=null;
      if(wave.mode==="manual"&&wave.manualTimes&&wave.manualTimes[sid]!==undefined){
        brut=wave.manualTimes[sid];
      } else if(wave.arrivals&&wave.arrivals[sid]&&wave.startedAt){
        brut=(wave.arrivals[sid]-wave.startedAt)/1000;
      }
      var net=brut!==null?brut-offset:null;
      var tirs=sessionSho[sid]||{};
      var totalOk=0;
      for(var i=1;i<=nTirs;i++)totalOk+=(tirs["t"+i]||0);
      var totalRate=nTirs*5-totalOk;
      var penSecs=isPenSec?(totalRate*penVal):0;
      var finalTime=net!==null?net+penSecs:null;
      var tirCols=[];
      for(var t=1;t<=nTirs;t++){tirCols.push(tirs["t"+t]!==undefined?tirs["t"+t]:"");tirCols.push(5);}
      var r={sid:sid,st:st,offset:offset,brut:brut,net:net,finalTime:finalTime,
             tirs:tirs,totalOk:totalOk,totalRate:totalRate,penSecs:penSecs,tirCols:tirCols,waveName:wave.name};
      waveRows.push(r);
      if(finalTime!==null)allResults.push(r);
    });
    wave._exportRows=waveRows;
  });

  // Global ranking
  var globalRanked=allResults.slice().sort(function(a,b){return a.finalTime-b.finalTime;});
  var globalBest=globalRanked.length?globalRanked[0].finalTime:null;

  // ── One block per wave ──
  rd.waves.forEach(function(wave,wIdx){
    var waveRows=wave._exportRows||[];
    if(!waveRows.length)return;

    // Wave ranking
    var waveRanked=waveRows.filter(function(r){return r.finalTime!==null;}).slice().sort(function(a,b){return a.finalTime-b.finalTime;});
    var waveBest=waveRanked.length?waveRanked[0].finalTime:null;

    lines.push("=== "+wave.name.toUpperCase()+" ===");
    lines.push(hdr.join(sep));

    // Sort by start offset
    var sorted=waveRows.slice().sort(function(a,b){return a.offset-b.offset;});
    sorted.forEach(function(r,i){
      var wRank=waveRanked.findIndex(function(x){return x.sid===r.sid;})+1;
      var wEcart=r.finalTime!==null&&waveBest!==null?r.finalTime-waveBest:null;
      var gRank=globalRanked.findIndex(function(x){return x.sid===r.sid;})+1;
      var gEcart=r.finalTime!==null&&globalBest!==null?r.finalTime-globalBest:null;
      var row=[(i+1)+"-",r.st.nom,r.st.prenom,secsToMMSS(r.offset)]
        .concat(r.tirCols)
        .concat([
          nTirs>0?r.totalOk:"",
          nTirs>0?r.totalRate:"",
          nTirs>0?(isPenSec?r.penSecs:r.totalRate):"",
          secsToMMSS(r.brut),
          secsToMMSS(r.net),
          secsToMMSS(r.finalTime),
          wRank>0?wRank:"",
          wEcart!==null?(wEcart===0?"00:00":"+"+secsToMMSS(wEcart)):"",
          gRank>0?gRank:"",
          gEcart!==null?(gEcart===0?"00:00":"+"+secsToMMSS(gEcart)):""
        ]);
      lines.push(row.join(sep));
    });

    // Wave ranking summary
    if(waveRanked.length>0){
      lines.push("");
      lines.push("Classement "+wave.name+sep+"Coureur"+sep+"Prénom"+sep+"Temps Final"+sep+"Écart");
      waveRanked.forEach(function(r,i){
        var ecart=i===0?0:r.finalTime-waveBest;
        lines.push((i+1)+sep+r.st.nom+sep+r.st.prenom+sep+secsToMMSS(r.finalTime)+sep+(i===0?"00:00":"+"+secsToMMSS(ecart)));
      });
    }
    lines.push("");
  });

  // ── Classement général (tous groupes confondus) ──
  if(globalRanked.length>0){
    lines.push("=== CLASSEMENT GÉNÉRAL ===");
    lines.push(["#","Groupe","Coureur","Prénom","Temps Final","Écart 1er"].join(sep));
    globalRanked.forEach(function(r,i){
      var ecart=i===0?0:r.finalTime-globalBest;
      lines.push([(i+1),r.waveName,r.st.nom,r.st.prenom,secsToMMSS(r.finalTime),i===0?"00:00":"+"+secsToMMSS(ecart)].join(sep));
    });
  }

  // Download
  var blob=new Blob(["﻿"+lines.join("\n")],{type:"text/csv;charset=utf-8;"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;
  var gName=(getGroup(CURRENT_GROUP_ID)||{}).name||"";
  a.download=gName+"_"+session.label.replace(/[^a-zA-Z0-9]/g,"_")+"_"+session.date+".csv";
  document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},500);
}

        var elapsed=Math.floor((Date.now()-startedAt)/1000);
        var m=Math.floor(elapsed/60),s=elapsed%60;

      }
      updateChrono();
      var iv=setInterval(function(){
        if(!document.body.contains(chronoEl)){clearInterval(iv);return;}
        updateChrono();
      },500);
      startBanner.appendChild(chronoEl);
      var chronoInfo=d({flex:"1"});
      chronoInfo.appendChild(h("div",{style:{color:"#22c55e",fontWeight:"700",fontSize:"13px"}},"🟢 Course en cours"));
      chronoInfo.appendChild(h("div",{style:{color:"#64748b",fontSize:"11px"}},"Départ : "+new Date(startedAt).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit",second:"2-digit"})));
      startBanner.appendChild(chronoInfo);
      var resetBtn=h("button",{style:{background:"#1e293b",border:"1px solid #334155",borderRadius:"8px",color:"#94a3b8",padding:"8px 14px",fontSize:"12px",fontWeight:"600"},onClick:function(e){
        var btn=e.currentTarget;
        if(btn.dataset.confirm==="1"){
          var newRd=Object.assign({},rd,{waves:rd.waves.map(function(w){return w.isRelay?Object.assign({},w,{startedAt:null,legTimes:{}}):w;})});
          saveRd(sId,newRd);
        } else {
          btn.dataset.confirm="1";
          btn.textContent="Confirmer ?";
          btn.style.color="#f87171";
          btn.style.borderColor="#f87171";
          setTimeout(function(){if(btn.dataset.confirm==="1"){btn.dataset.confirm="0";btn.textContent="↺ Reset";btn.style.color="#94a3b8";btn.style.borderColor="#334155";}},3000);
        }
      }});
      resetBtn.textContent="↺ Reset";
      startBanner.appendChild(resetBtn);
    } else {
      startBanner.appendChild(h("span",{style:{fontSize:"28px"}},"⏱"));
      var siInfo=d({flex:"1"});
      siInfo.appendChild(h("div",{style:{color:"#f1f5f9",fontWeight:"700",fontSize:"14px"}},"Relais par équipes · Mass Start"));
      siInfo.appendChild(h("div",{style:{color:"#64748b",fontSize:"12px"}},"Toutes les équipes partent ensemble"));
      startBanner.appendChild(siInfo);
      var startBtn=h("button",{style:{background:"linear-gradient(135deg,#166534,#15803d)",border:"none",borderRadius:"10px",color:"#f0fdf4",padding:"12px 20px",fontSize:"16px",fontWeight:"900",flexShrink:"0"},onClick:function(){
        var now=Date.now();
        var newRd=Object.assign({},rd,{waves:rd.waves.map(function(w){return w.isRelay?Object.assign({},w,{startedAt:now}):w;})});
        saveRd(sId,newRd);
      }});
      startBtn.textContent="🚀 DÉPART";
      startBanner.appendChild(startBtn);
    }
    div.appendChild(startBanner);
  }

  rd.waves.forEach(function(wave){
    if(wave.isRelay){div.appendChild(buildRelayWaveCard(wave,session));}
    else{div.appendChild(buildWaveCard(wave,session,presentStudents));}
  });

  if(unassigned.length>0&&!rd.waves.some(function(w){return w.isRelay;})){
    var btn=h("button",{style:{width:"100%",padding:"16px",background:"#0a1428",border:"2px dashed #1e3a5f",borderRadius:"12px",color:"#3b82f6",fontSize:"15px",fontWeight:"700",marginTop:"8px",display:"flex",alignItems:"center",justifyContent:"center",gap:"8px"},onClick:function(){
      setState({waveSetup:{step:1,selected:unassigned.map(function(s){return s.id;}),name:"Groupe "+(rd.waves.length+1),order:[],offsets:{},importDone:false,mode:"live"}});
    }});
    btn.appendChild(h("span",{style:{fontSize:"22px"}},"＋"));
    btn.appendChild(txt(" Nouveau groupe "));
    btn.appendChild(h("span",{style:{background:"#0f2d4c",color:"#60a5fa",fontSize:"11px",padding:"2px 8px",borderRadius:"4px"}},unassigned.length+" non affecté"+(unassigned.length>1?"s":"")));
    div.appendChild(btn);
  }

  // Relay classement block
  if(rd.waves.some(function(w){return w.isRelay;})){
    var relayResults=rd.waves.map(function(w){
      if(!w.isRelay)return null;
      var lt=w.legTimes||{};
      var rl=w.relayLegs||{};
      var total=0;var done=Object.keys(rl).length>0;
      Object.keys(rl).forEach(function(key){if(lt[key]>0)total+=lt[key];else done=false;});
      return done&&total>0?{wave:w,total:total}:null;
    }).filter(Boolean).sort(function(a,b){return a.total-b.total;});

    if(relayResults.length>0){
      var rklBox=d({background:"#080e1a",border:"1px solid #1e3a5f",borderRadius:"12px",marginTop:"14px",overflow:"hidden"});
      rklBox.appendChild(h("div",{style:{padding:"10px 16px",background:"#0a1428",borderBottom:"1px solid #1e293b",color:"#f59e0b",fontWeight:"700",fontSize:"14px"}},"🏆 Classement par équipe"));
      relayResults.forEach(function(res,ri){
        var col=res.wave.teamColor||"#3b82f6";
        var best=relayResults[0].total;
        var ecart=ri===0?0:res.total-best;
        var rrow=d({padding:"10px 16px",display:"flex",alignItems:"center",gap:"12px",borderBottom:"1px solid #1e293b10"});
        var medal=["🥇","🥈","🥉"][ri]||("#"+(ri+1));
        rrow.appendChild(h("span",{style:{fontSize:"18px",minWidth:"28px"}},medal));
        var dot2=d({width:"28px",height:"28px",borderRadius:"8px",background:col+"20",border:"2px solid "+col,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"900",fontSize:"13px",color:col,flexShrink:"0"});
        dot2.textContent=res.wave.name.replace("Équipe","").trim();rrow.appendChild(dot2);
        rrow.appendChild(h("div",{style:{flex:"1",color:"#f1f5f9",fontWeight:"600",fontSize:"14px"}},res.wave.name));

        times.appendChild(h("div",{style:{color:col,fontFamily:"monospace",fontWeight:"700",fontSize:"16px"}},fmtTime(res.total)));
        if(ecart>0)times.appendChild(h("div",{style:{color:"#64748b",fontSize:"11px"}},"+"+fmtTime(ecart)));
        rrow.appendChild(times);
        rklBox.appendChild(rrow);
      });
      div.appendChild(rklBox);
    }
  }
  // Export button — only show if there's at least one wave with data
  var hasData=rd.waves.some(function(w){
    return w.studentIds.some(function(id){return(w.arrivals&&w.arrivals[id])||(w.manualTimes&&w.manualTimes[id]!==undefined);});
  });
  if(hasData){
    var btnRow=d({display:"flex",gap:"8px",marginTop:"12px"});

    var expBtn=h("button",{style:{
      flex:"1",padding:"13px",borderRadius:"10px",
      border:"1px solid #334155",background:"#0a1428",
      display:"flex",alignItems:"center",justifyContent:"center",gap:"8px",
      color:"#94a3b8",fontWeight:"700",fontSize:"13px"
    },onClick:function(){exportSessionCSV(session);}});
    expBtn.appendChild(h("span",{style:{fontSize:"16px"}},"📥"));
    expBtn.appendChild(txt("Exporter (.csv)"));
    btnRow.appendChild(expBtn);

    // Bracket button — only for mass start
    if(session.startType==="mass"){
      var ranking=getSessionRanking(sId);
      if(ranking.length>=4){
        var brkBtn=h("button",{style:{
          flex:"1",padding:"13px",borderRadius:"10px",
          border:"2px solid #f59e0b60",background:"#1a1000",
          display:"flex",alignItems:"center",justifyContent:"center",gap:"8px",
          color:"#f59e0b",fontWeight:"700",fontSize:"13px"
        },onClick:function(){setState({bracketModal:true,bracketCfg:{maxPerDemi:8,nQualif:4,targetSession:null}});}});
        brkBtn.appendChild(h("span",{style:{fontSize:"16px"}},"🏆"));
        brkBtn.appendChild(txt("Phases finales"));
        btnRow.appendChild(brkBtn);
      }
    }
    div.appendChild(btnRow);
  }

  if(state.bracketModal){
    var bModal=buildBracketModal(session);
    if(bModal)div.appendChild(bModal);
  }

  return div;
}


function buildRelayWaveCard(wave,session){
  var sId=session.id;
  var gid=CURRENT_GROUP_ID;
  var teamColor=wave.teamColor||"#3b82f6";
  var relayLegs=wave.relayLegs||{};   // { id: legNum, id_2: legNum }
  var legTimes=wave.legTimes||{};     // { slotKey: seconds }
  var doublerIds=wave.doublerIds||[];
  var startedAt=wave.startedAt||null;

  // ── Construire les slots ordonnés depuis relayLegs ──
  var slots=Object.keys(relayLegs).map(function(key){
    var isSecond=key.endsWith('_2');
    var id=isSecond?key.slice(0,-2):key;
    return{key:key,id:id,isSecond:isSecond,legNum:relayLegs[key]};
  }).sort(function(a,b){return a.legNum-b.legNum;});

  var nLegs=slots.length;

  // ── Total équipe (somme de tous les legs) ──
  var totalTime=0,allDone=slots.length>0;
  slots.forEach(function(sl){
    var t=legTimes[sl.key];
    if(t!==undefined&&t>0)totalTime+=t;
    else allDone=false;
  });

  // ── Index du leg actif (premier sans temps) ──
  var activeIdx=-1;
  if(startedAt){
    for(var i=0;i<slots.length;i++){if(legTimes[slots[i].key]===undefined||legTimes[slots[i].key]<=0){activeIdx=i;break;}}
  }

  var legNames=["1er","2e","3e","4e","5e","6e"];

  var card=d({background:"#0d1525",border:"2px solid "+teamColor+"50",borderRadius:"14px",marginBottom:"12px",overflow:"hidden"});

  // ── Header ──
  var hdr=d({background:"#080e1a",padding:"12px 16px",display:"flex",alignItems:"center",gap:"12px",borderBottom:"1px solid "+teamColor+"30"});
  var dot=d({width:"36px",height:"36px",borderRadius:"10px",background:teamColor+"20",border:"2px solid "+teamColor,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"900",fontSize:"16px",color:teamColor,flexShrink:"0"});
  dot.textContent=wave.name.replace("Équipe","").trim()||"?";hdr.appendChild(dot);
  var hInfo=d({flex:"1"});
  hInfo.appendChild(h("div",{style:{color:"#f1f5f9",fontWeight:"700",fontSize:"15px"}},wave.name));
  hInfo.appendChild(h("div",{style:{color:"#64748b",fontSize:"11px"}},nLegs+" relayeurs · "+slots.filter(function(sl){return legTimes[sl.key]>0;}).length+" terminé"+(slots.filter(function(sl){return legTimes[sl.key]>0;}).length>1?"s":"")));
  hdr.appendChild(hInfo);
  if(allDone&&totalTime>0){
    var tot=d({textAlign:"right"});
    tot.appendChild(h("div",{style:{color:teamColor,fontFamily:"monospace",fontWeight:"900",fontSize:"20px"}},fmtTime(totalTime)));
    tot.appendChild(h("div",{style:{color:"#64748b",fontSize:"10px"}},"TOTAL"));
    hdr.appendChild(tot);
  }
  var delBtn=h("button",{style:{background:"transparent",border:"none",color:"#334155",fontSize:"18px",padding:"4px 8px"},onClick:function(wid){return function(ev){var b=ev.currentTarget;if(b.dataset.c==="1"){deleteWave(wid);}else{b.dataset.c="1";b.textContent="✕?";b.style.color="#f87171";setTimeout(function(){if(b.dataset.c==="1"){b.dataset.c="0";b.textContent="✕";b.style.color="#334155";}},3000);}};}(wave.id)});
  delBtn.textContent="✕";hdr.appendChild(delBtn);
  card.appendChild(hdr);

  // ── Legs ──
  var body=d({padding:"10px 14px",display:"flex",flexDirection:"column",gap:"8px"});

  slots.forEach(function(slot,si){
    var st=getStudents().find(function(s){return s.id===slot.id;});
    if(!st)return;
    var isActive=si===activeIdx;
    var isDone=legTimes[slot.key]!==undefined&&legTimes[slot.key]>0;
    var isPending=!isActive&&!isDone;

    // Lire les tirs via la clé du slot (id ou id_2)
    var allShoData=load("sho_"+gid,{})[sId]||{};
    var tirKey=slot.key; // id ou id_2
    var tirs=allShoData[tirKey]||{};
    var nTirs=session.tirs||0;
    var totalOk=0;for(var ti2=1;ti2<=nTirs;ti2++)totalOk+=(tirs["t"+ti2]||0);
    var totalRate=nTirs*5-totalOk;
    var hasTir=Object.keys(tirs).length>0;

    var row=d({
      background:isActive?teamColor+"18":isDone?teamColor+"0a":"#06090f",
      border:"1px solid "+(isActive?teamColor+"80":isDone?teamColor+"25":"#1e293b"),
      borderRadius:"10px",padding:"10px 12px",
      opacity:isPending?"0.55":"1"
    });

    // ── Ligne nom + badge leg ──
    var topRow=d({display:"flex",alignItems:"center",gap:"10px",marginBottom:isActive||isDone?"8px":"0"});
    var legBadge=d({
      background:isActive?teamColor:isDone?teamColor+"60":"#1e293b",
      color:"#fff",borderRadius:"6px",padding:"3px 9px",fontSize:"11px",fontWeight:"700",flexShrink:"0"
    });
    legBadge.textContent=(legNames[si]||("R"+(si+1)))+" rel.";
    topRow.appendChild(legBadge);

    var nm=d({flex:"1"});
    nm.appendChild(h("span",{style:{color:isActive?"#f1f5f9":isDone?"#94a3b8":"#475569",fontWeight:"700",fontSize:"14px"}},st.nom+" "));
    nm.appendChild(h("span",{style:{color:isDone?"#64748b":"#64748b",fontSize:"12px"}},st.prenom));
    if(slot.isSecond)nm.appendChild(h("span",{style:{background:"#8b5cf6",color:"#fff",borderRadius:"4px",padding:"1px 6px",fontSize:"10px",fontWeight:"700",marginLeft:"6px"}},"×2"));
    topRow.appendChild(nm);

    // Tirs résumé (si données)
    if(hasTir){
      var tirDots=d({display:"flex",gap:"3px",alignItems:"center",flexShrink:"0"});
      for(var ti3=1;ti3<=nTirs;ti3++){
        var ok2=tirs["t"+ti3]||0;
        var dot2=d({background:ok2>=4?"#22c55e":ok2>=2?"#f59e0b":"#ef4444",borderRadius:"3px",padding:"1px 5px",fontSize:"10px",color:"#fff",fontWeight:"700"});
        dot2.textContent=ok2+"/5";
        tirDots.appendChild(dot2);
      }
      topRow.appendChild(tirDots);
    }
    row.appendChild(topRow);

    // ── Saisie tirs inline (leg actif uniquement) ──
    if((isActive||isDone)&&nTirs>0){
      var tirRow=d({display:"flex",alignItems:"center",gap:"6px",marginBottom:"8px",flexWrap:"wrap"});
      tirRow.appendChild(h("span",{style:{color:"#64748b",fontSize:"11px",minWidth:"30px"}},"Tirs :"));
      for(var ti4=1;ti4<=nTirs;ti4++){(function(tIdx){
        var posName=["Couché","Debout","Couché","Debout"][tIdx-1]||("T"+tIdx);
        var curVal=(tirs["t"+tIdx]||0);
        var tirBtn=d({display:"flex",flexDirection:"column",alignItems:"center",gap:"2px",cursor:"pointer"});
        var tirNum=d({background:curVal>=4?"#15803d":curVal>=2?"#b45309":"#991b1b",color:"#fff",borderRadius:"5px",padding:"4px 8px",fontSize:"14px",fontWeight:"900",minWidth:"36px",textAlign:"center"});
        tirNum.textContent=curVal;
        var tirLbl=d({color:"#475569",fontSize:"9px",textAlign:"center"});
        tirLbl.textContent=posName;
        tirBtn.appendChild(tirNum);tirBtn.appendChild(tirLbl);
        tirBtn.addEventListener("click",function(tKey,tI,el){return function(){
          var allSho=load("sho_"+gid,{});
          var sessSho=Object.assign({},allSho[sId]||{});
          var slotSho=Object.assign({},sessSho[tKey]||{});
          var cur=slotSho["t"+tI]||0;
          slotSho["t"+tI]=(cur+1)%6;
          sessSho[tKey]=slotSho;
          allSho[sId]=sessSho;
          save("sho_"+gid,allSho);
          setState({});
        };}(tirKey,tIdx,tirBtn));
        tirRow.appendChild(tirBtn);
      })(ti4);}
      row.appendChild(tirRow);
    }

    // ── Saisie temps ──
    if(isActive||isDone){
      var statRow=d({display:"flex",gap:"8px",alignItems:"center",flexWrap:"wrap"});

      // ── Bouton passage de relais (leg actif uniquement, si chrono lancé) ──
      if(isActive&&startedAt){
        var isLast=si===slots.length-1;
        var handoffBtn=h("button",{style:{
          background:isLast?"linear-gradient(135deg,#166534,#15803d)":"linear-gradient(135deg,"+teamColor+"cc,"+teamColor+")",
          border:"none",borderRadius:"9px",color:"#fff",
          padding:"10px 16px",fontSize:"14px",fontWeight:"900",
          flexShrink:"0",letterSpacing:"0.02em",
          boxShadow:"0 2px 8px "+teamColor+"60"
        },onClick:function(wid,slotKey,ts){return function(){
          var elapsed=Math.floor((Date.now()-ts)/1000);
          updateWave(wid,function(w){
            var lt=Object.assign({},w.legTimes||{});
            lt[slotKey]=elapsed;
            return Object.assign({},w,{legTimes:lt});
          });
        };}(wave.id,slot.key,startedAt)});
        handoffBtn.textContent=isLast?"🏁 Arrivée":"🤝 Passage relais";
        statRow.appendChild(handoffBtn);
      }

      var timeLabel=d({color:"#64748b",fontSize:"11px",flexShrink:"0",marginLeft:isActive&&startedAt?"4px":"0"});
      timeLabel.textContent="ou MM:SS :";
      statRow.appendChild(timeLabel);

      var existingTime=legTimes[slot.key]!==undefined&&legTimes[slot.key]>0?fmtTime(legTimes[slot.key]):"";
      var inp=h("input",{type:"text",style:{width:"78px",background:"#0f2d4c",border:"1px solid "+teamColor+"60",borderRadius:"6px",color:teamColor,fontFamily:"monospace",fontSize:"16px",textAlign:"center",padding:"5px 4px"},placeholder:"MM:SS",value:existingTime});
      inp.addEventListener("blur",function(wid,slotKey){return function(e){
        var secs=parseMMSS(e.target.value);
        updateWave(wid,function(w){
          var lt=Object.assign({},w.legTimes||{});
          if(secs>0)lt[slotKey]=secs;else delete lt[slotKey];
          return Object.assign({},w,{legTimes:lt});
        });
      };}(wave.id,slot.key));
      inp.addEventListener("keydown",function(e){if(e.key==="Enter")e.target.blur();});
      statRow.appendChild(inp);

      if(isDone){
        var t2=legTimes[slot.key];
        var legDist=nLegs>0?Math.round((session.distance||0)/nLegs):0;
        var allure=legDist>0?Math.round(t2/legDist*1000):null;
        var stats2=d({display:"flex",gap:"10px",alignItems:"center",flexWrap:"wrap"});
        stats2.appendChild(h("span",{style:{color:teamColor,fontFamily:"monospace",fontWeight:"700",fontSize:"15px"}},fmtTime(t2)));
        if(allure)stats2.appendChild(h("span",{style:{color:"#64748b",fontSize:"11px"}},fmtTime(allure)+"/km"));
        if(hasTir)stats2.appendChild(h("span",{style:{color:totalRate>0?"#f87171":"#22c55e",fontSize:"11px"}},totalOk+"/"+(nTirs*5)+" · "+totalRate+"✗"));
        statRow.appendChild(stats2);
      }
      row.appendChild(statRow);
    }

    body.appendChild(row);
  });

  // Résumé final si terminé
  if(allDone&&totalTime>0){
    var allure3=session.distance>0?Math.round(totalTime/session.distance*1000):null;
    var summ=d({background:teamColor+"10",border:"1px solid "+teamColor+"30",borderRadius:"8px",padding:"8px 12px",display:"flex",gap:"14px",alignItems:"center",marginTop:"4px",flexWrap:"wrap"});
    summ.appendChild(h("span",{style:{color:teamColor,fontWeight:"700",fontSize:"14px"}},"✓ Total : "+fmtTime(totalTime)));
    if(allure3)summ.appendChild(h("span",{style:{color:"#64748b",fontSize:"12px"}},fmtTime(allure3)+"/km équipe"));
    body.appendChild(summ);
  }

  card.appendChild(body);
  return card;
}

function buildWaveCard(wave,session,presentStudents){
  var sId=state.sessionId;
  var students=presentStudents.filter(function(s){return wave.studentIds.indexOf(s.id)>=0;});
  var isManualMode=wave.mode==="manual";
  var allManual=isManualMode&&wave.studentIds.every(function(id){return wave.manualTimes&&wave.manualTimes[id]!==undefined;});
  var allArrived=!isManualMode&&wave.studentIds.length>0&&wave.studentIds.every(function(id){return(wave.arrivals||{})[id];});
  var arrivedCount=isManualMode?Object.keys(wave.manualTimes||{}).length:Object.keys(wave.arrivals||{}).length;
  var status=isManualMode?(allManual?"done":"manual"):(!wave.startedAt?"pending":allArrived?"done":"running");
  var statusBorder={pending:"#1e3a5f",running:"#166534",done:"#1e4d8c",manual:"#7c3aed"}[status];

  // Sort by startOffset for both staggered and pursuit (mass = all 0, order doesn't matter)
  var sortedStudents=(session.startType==="staggered"||session.startType==="pursuit")?students.slice().sort(function(a,b){return((wave.startOffsets||{})[a.id]||0)-((wave.startOffsets||{})[b.id]||0);}):students;

  var results=[];
  sortedStudents.forEach(function(s){
    var res=getStudentResult(s.id,sId);
    if(res)results.push({student:s,res:res});
  });
  results.sort(function(a,b){return a.res.finalTime-b.res.finalTime;});

  var card=d({background:"#0d1525",border:"2px solid "+statusBorder,borderRadius:"12px",marginBottom:"12px",overflow:"hidden"});

  // Header
  var hdr=d({background:status==="running"?"#0a1e0a":status==="done"?"#0a1630":status==="manual"?"#1a0f2d":"#0d1d35",padding:"12px 16px",display:"flex",alignItems:"center",gap:"10px"});
  var hInfo=d({flex:"1"});
  var ttlRow=d({display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"});
  ttlRow.appendChild(h("span",{style:{color:"#f1f5f9",fontWeight:"700",fontSize:"16px"}},wave.name));
  var statusLabels={pending:"En attente",running:"🔴 EN COURSE",done:"✓ Terminé",manual:"📝 Saisie"};
  ttlRow.appendChild(h("span",{style:{background:statusBorder+"40",color:status==="running"?"#4ade80":status==="done"?"#60a5fa":status==="manual"?"#c084fc":"#64748b",fontSize:"11px",padding:"2px 7px",borderRadius:"4px",fontWeight:"700"}},statusLabels[status]));
  hInfo.appendChild(ttlRow);
  hInfo.appendChild(h("div",{style:{color:"#64748b",fontSize:"12px",marginTop:"2px"}},students.length+" coureur"+(students.length>1?"s":"")+(wave.startedAt?" · Départ "+new Date(wave.startedAt).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit",second:"2-digit"}):"")));
  hdr.appendChild(hInfo);
  // Mode toggle button

function deleteWave(waveId){
  var sId=state.sessionId;
  var rd=state.raceData[sId]||{waves:[]};
  saveRd(sId,Object.assign({},rd,{waves:rd.waves.filter(function(w){return w.id!==waveId;})}));
}

function startWave(waveId){
  var rd=state.raceData[state.sessionId];
  var wv=rd&&rd.waves?rd.waves.find(function(w){return w.id===waveId;}):null;
  if(wv&&wv.startedAt){/* proceed */}
  updateWave(waveId,function(w){return Object.assign({},w,{startedAt:Date.now(),arrivals:{}});});
}

function recordArrival(waveId,stId){
  var rd=state.raceData[state.sessionId];
  var wave=rd&&rd.waves?rd.waves.find(function(w){return w.id===waveId;}):null;
  if(!wave)return;
  if((wave.arrivals||{})[stId]){
    /* proceed */
    updateWave(waveId,function(w){var a=Object.assign({},w.arrivals);delete a[stId];return Object.assign({},w,{arrivals:a});});
  } else {
    updateWave(waveId,function(w){var a=Object.assign({},w.arrivals||{});a[stId]=Date.now();return Object.assign({},w,{arrivals:a});});
  }
}

function buildResultsTable(results,session){
  var medals=["#f59e0b","#94a3b8","#b45309"];
  var isPursuit=session.startType==="pursuit";
  var tbl=d({background:"#060d1a",border:"1px solid #1e3a5f",borderRadius:"10px",overflow:"hidden"});
  var hdr=d({padding:"9px 14px",background:"#0f1929",borderBottom:"1px solid #1e293b",display:"flex",alignItems:"center",gap:"8px"});
  hdr.appendChild(h("span",{style:{fontSize:"15px"}},"🏆"));
  hdr.appendChild(h("span",{style:{color:"#f1f5f9",fontWeight:"700",fontSize:"13px"}},"Classement"));
  hdr.appendChild(h("span",{style:{color:session.penaltyType==="seconds"?"#f59e0b":isPursuit?"#a78bfa":"#22c55e",fontSize:"11px",marginLeft:"auto"}},session.penaltyType==="seconds"?"temps net = brut − départ + pénalités":isPursuit?"poursuite · 1er arrivé gagne":"1er à l'arrivée gagne"));
  tbl.appendChild(hdr);
  results.forEach(function(item,idx){
    var student=item.student,res=item.res;
    var medal=medals[idx]||null;
    var gap=idx>0?res.finalTime-results[0].res.finalTime:0;
    // Distance réelle = course + boucles de pénalité
    var missed=res.missed||calcMissed(student.id,session.id)||0;
    var penLoopDist=missed*(session.penaltyLoop||0);
    var realDist=session.distance+penLoopDist;
    var allureSec=realDist>0?res.finalTime/(realDist/1000):null;
    var row=d({padding:"9px 14px",borderBottom:idx<results.length-1?"1px solid #0f1929":"none",background:idx===0?"#0d1e0d":idx%2===0?"#060d1a":"#080f1e",display:"flex",alignItems:"center",gap:"10px"});
    var nb=d({width:"26px",height:"26px",borderRadius:"50%",background:medal?medal+"30":"#0a1428",border:"2px solid "+(medal||"#1e293b"),display:"flex",alignItems:"center",justifyContent:"center",color:medal||"#475569",fontWeight:"700",fontSize:"13px",flexShrink:"0"});
    nb.textContent=idx+1;row.appendChild(nb);
    var info=d({flex:"1",minWidth:"0"});
    info.appendChild(h("div",{style:{color:"#f1f5f9",fontWeight:"700",fontSize:"14px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},student.nom+" "+student.prenom));
    var sub=d({display:"flex",gap:"8px",marginTop:"2px",flexWrap:"wrap"});
    if(isPursuit&&res.runSecs)sub.appendChild(h("span",{style:{color:"#a78bfa",fontSize:"10px"}},"temps tour : "+fmtTime(res.runSecs)));
    if(res.offset>0&&!isPursuit)sub.appendChild(h("span",{style:{color:"#a78bfa",fontSize:"10px"}},"départ +"+fmtTime(res.offset)));
    if(session.penaltyType==="seconds"&&res.missed>0)sub.appendChild(h("span",{style:{color:"#ef4444",fontSize:"10px"}},res.missed+" raté"+(res.missed>1?"s":"")+" +"+fmtTime(res.missed*(session.penaltyPerMiss||10))));
    if(session.penaltyType==="seconds"&&res.missed===0)sub.appendChild(h("span",{style:{color:"#22c55e",fontSize:"10px"}},"✓ 0 pénalité"));
    if(penLoopDist>0)sub.appendChild(h("span",{style:{color:"#f87171",fontSize:"10px"}},missed+" boucle"+(missed>1?"s":"")+" +"+penLoopDist+"m"));
    if(allureSec)sub.appendChild(h("span",{style:{color:"#64748b",fontSize:"10px"}},fmtTime(allureSec)+"/km ("+Math.round(realDist/1000*100)/100+"km réel)"));
    if(idx>0)sub.appendChild(h("span",{style:{color:"#64748b",fontSize:"10px"}},"+"+fmtTime(gap)));
    if(res.manual)sub.appendChild(h("span",{style:{color:"#7c3aed",fontSize:"10px"}},"saisie manuelle"));
    info.appendChild(sub);row.appendChild(info);
    var times=d({textAlign:"right"});
    times.appendChild(h("div",{style:{fontFamily:"monospace",fontWeight:"700",fontSize:"17px",color:idx===0?"#4ade80":"#f1f5f9"}},fmtTime(res.finalTime)));
    if(session.penaltyType==="seconds"&&res.missed>0)times.appendChild(h("div",{style:{color:"#64748b",fontSize:"10px",fontFamily:"monospace"}},"brut "+fmtTime(res.runSecs)));
    row.appendChild(times);
    tbl.appendChild(row);
  });
  return tbl;
}

function confirmWave(session,ws){
  var startOffsets={};
  if(session.startType==="staggered"){var ord=ws.order.length?ws.order:ws.selected;ord.forEach(function(id,i){startOffsets[id]=i*session.startInterval;});}
  else if(session.startType==="pursuit"){ws.selected.forEach(function(id){startOffsets[id]=parseMMSS(ws.offsets[id]||"0");});}
  var sId=state.sessionId;
  var rd=state.raceData[sId]||{waves:[]};
  var wave={id:Date.now().toString(),name:ws.name,studentIds:ws.selected,startOffsets:startOffsets,startedAt:null,arrivals:{},mode:ws.mode||"live",manualTimes:{}};
  saveRd(sId,Object.assign({},rd,{waves:rd.waves.concat([wave])}));
  setState({waveSetup:null});
}

  [["Nom","Prénom","Statut"],["Dupont","Marie","SHN"],["Martin","Paul",""]].forEach(function(row){
    row.forEach(function(cell,i){
      var el=h("span",{style:{color:cell===row[0]&&row[0]==="Nom"?"#60a5fa":i===0?"#94a3b8":"#64748b"}},cell);
      tipTable.appendChild(el);
    });
  });
  tipBox.appendChild(tipTable);
  xlsxBox.appendChild(tipBox);

  // File input
  var fileInput=h("input",{type:"file",accept:".xlsx,.xls,.csv",style:{display:"none"}});
  var importStatus=d({minHeight:"18px",fontSize:"12px",marginTop:"8px"});

  fileInput.addEventListener("change",function(e){
    var file=e.target.files[0];
    if(!file)return;
    importStatus.textContent="Lecture en cours…";
    importStatus.style.color="#f59e0b";
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var data=new Uint8Array(ev.target.result);
        var workbook=XLSX.read(data,{type:"array"});
        var sheet=workbook.Sheets[workbook.SheetNames[0]];
        var rows=XLSX.utils.sheet_to_json(sheet,{header:1,defval:""});
        if(!rows.length){importStatus.textContent="Fichier vide.";importStatus.style.color="#ef4444";return;}

        // Detect header row: look for a row containing "nom" or "prenom" (case-insensitive)
        var headerIdx=0;
        var colNom=-1,colPrenom=-1,colDs=-1;
        for(var ri=0;ri<Math.min(5,rows.length);ri++){
          var row=rows[ri];
          for(var ci=0;ci<row.length;ci++){
            var cell=String(row[ci]).toLowerCase().trim();
            if(cell==="nom"||cell==="name"||cell==="last name"||cell==="lastname")colNom=ci;
            if(cell==="prénom"||cell==="prenom"||cell==="first name"||cell==="firstname")colPrenom=ci;
            if(cell==="statut"||cell==="status"||cell==="ds"||cell==="type")colDs=ci;
          }
          if(colNom>=0&&colPrenom>=0){headerIdx=ri;break;}
        }

        // If no header found, guess: col 0=Nom, col 1=Prénom, col 2=Statut
        if(colNom<0){colNom=0;}
        if(colPrenom<0){colPrenom=1;}
        if(colDs<0){colDs=2;}
        var startRow=colNom===0&&colPrenom===1?0:headerIdx+1;

        var g=getGroup(CURRENT_GROUP_ID);
        if(!g)return;
        var maxId=g.students.reduce(function(m,s){return s.id>m?s.id:m;},0);
        var added=0,skipped=0;
        for(var i=startRow;i<rows.length;i++){
          var r=rows[i];
          var nom=String(r[colNom]||"").trim();
          var prenom=String(r[colPrenom]||"").trim();
          if(!nom||!prenom){skipped++;continue;}
          // skip header row if strings match known headers
          if(nom.toLowerCase()==="nom"||nom.toLowerCase()==="name"){continue;}
          var dsRaw=String(r[colDs]||"").trim().toUpperCase();
          var ds=dsRaw==="SHN"?"SHN":dsRaw==="AMG"?"AMG":"normal";
          // Check duplicate
          var dup=g.students.find(function(x){return x.nom.toLowerCase()===nom.toLowerCase()&&x.prenom.toLowerCase()===prenom.toLowerCase();});
          if(dup){skipped++;continue;}
          maxId++;
          g.students.push({id:maxId,nom:nom,prenom:prenom,ds:ds});
          added++;
        }
        save("groups",GROUPS);
        importStatus.style.color="#22c55e";
        importStatus.textContent="✓ "+added+" élève"+(added>1?"s":"")+" importé"+(added>1?"s":"")+(skipped>0?" · "+skipped+" ignoré"+(skipped>1?"s":""):"");
        // Refresh list
        var listEl=document.getElementById("student-list");
        if(listEl){listEl.innerHTML="";rebuildStudentList(listEl);}
      }catch(err){
        importStatus.textContent="Erreur : "+err.message;
        importStatus.style.color="#ef4444";
      }

    } else {
      var diffS=Math.round(rS10.finalTime-rS5.finalTime); // positif = régression, négatif = progression
      sprintDetail="S5 : "+fmtTime(rS5.finalTime)+" · S10 : "+fmtTime(rS10.finalTime)+" · Écart : "+(diffS>=0?"+":"")+diffS+"s";
      if(diffS>60)sprintPts=-3;
      else if(diffS>40)sprintPts=-2;
      else if(diffS>20)sprintPts=-1;
      else if(diffS>=-20)sprintPts=0;
      else if(diffS>=-40)sprintPts=1;
      else if(diffS>=-60)sprintPts=2;
      else sprintPts=3;
    }
    var sprintColor=sprintPts===null?"#475569":sprintPts>0?"#22c55e":sprintPts<0?"#f87171":"#f59e0b";

    // ── 2. Classement sprint S10 (garçon/fille) ──
    var rankingS10=getSessionRanking("S10");
    var classePts=null,classeDetail="",classeNA=false;
    if(!rankingS10.length||!rS10){
      classeNA=true;classeDetail="Pas de résultats S10";
    } else {
      var students10=rankingS10.filter(function(r){return!r.isTeam;});
      var myRank=students10.findIndex(function(r){return r.studentId===student.id;})+1;
      if(!myRank){classeNA=true;classeDetail="Non classé S10";}
      else{
        classeDetail="Classement général S10 : "+myRank+"e / "+students10.length;
        classePts=myRank===1?3:myRank===2?2:myRank===3?1:0;
      }
    }
    var classeColor=classePts===null?"#475569":classePts>=3?"#fbbf24":classePts>=2?"#94a3b8":classePts>=1?"#cd7c3a":"#475569";

    // ── 3. Classement relais S12 (Mass Start équipe) ──
    var rdS12=state.raceData["S12"]||{waves:[]};
    var relayWaves=rdS12.waves.filter(function(w){return w.isRelay;});
    var relaisPts=null,relaisDetail="",relaisNA=false;
    if(!relayWaves.length){
      relaisNA=true;relaisDetail="S12 (relais) non disputée";
    } else {
      // Trouver l'équipe de l'élève
      var myRelayWave=null;
      relayWaves.forEach(function(w){
        if((w.studentIds||[]).indexOf(student.id)>=0)myRelayWave=w;
      });
      if(!myRelayWave){relaisNA=true;relaisDetail="Non engagé en relais S12";}
      else{
        // Calculer les temps totaux de chaque équipe
        var relayTotals=relayWaves.map(function(w){
          var rl=w.relayLegs||{};var lt=w.legTimes||{};
          var total=0;var done=Object.keys(rl).length>0;
          Object.keys(rl).forEach(function(k){if(lt[k]>0)total+=lt[k];else done=false;});
          return{wave:w,total:done?total:null};
        }).filter(function(x){return x.total!==null;}).sort(function(a,b){return a.total-b.total;});
        var myPos=relayTotals.findIndex(function(x){return x.wave.id===myRelayWave.id;})+1;
        if(!myPos){relaisNA=true;relaisDetail="Temps équipe non enregistré";}
        else{
          relaisDetail="Classement relais S12 : "+myPos+"e / "+relayTotals.length+" équipes";
          relaisPts=myPos===1?3:myPos===2?2:myPos===3?1:0;
        }
      }
    }
    var relaisColor=relaisPts===null?"#475569":relaisPts>=3?"#fbbf24":relaisPts>=2?"#94a3b8":relaisPts>=1?"#cd7c3a":"#475569";

    // ── 4. Précision tir (toutes séances avec tirs) ──
    var tirPts=null,tirDetail="",tirNA=false;
    if(!tirRows.length){tirNA=true;tirDetail="Aucune donnée de tir";}
    else{
      var totalHits=0,totalPossible=0;
      tirRows.forEach(function(r){totalHits+=r.hits;totalPossible+=r.done*5;});
      var globalPct=totalPossible>0?Math.round(totalHits/totalPossible*100):0;
      tirDetail="Total saison : "+totalHits+"/"+totalPossible+" ("+globalPct+"%) · "+tirRows.length+" séance"+(tirRows.length>1?"s":"");
      tirPts=globalPct<33?0:globalPct<66?1:2;
    }
    var tirColor=tirPts===null?"#475569":tirPts>=2?"#22c55e":tirPts>=1?"#f59e0b":"#f87171";

    // ── 5. Investissement (saisie manuelle) ──
    var investPts=investVal>=0?investVal:null;
    var investDetail="À saisir par l'enseignant";
    var investColor=investPts===2?"#22c55e":investPts===1?"#f59e0b":investPts===0?"#f87171":"#475569";

    // ── Total — calculé sur les critères disponibles uniquement ──
    var bonusSum=0,nMissing=0;
    [sprintPts,classePts,relaisPts,tirPts,investPts].forEach(function(p){
      if(p!==null)bonusSum+=p;else nMissing++;
    });
    var allSet=nMissing===0;
    var noteFinale=Math.min(20,Math.max(0,10+bonusSum));

    // ── Correspondance lettre ECTS ──
    function noteLetter(n){
      return n>=17?"A":n>=15?"B":n>=13?"C":n>=12?"D":n>=10?"E":n>=6?"Fx":"F";
    }
    function letterColor(l){
      return{A:"#2563eb",B:"#166534",C:"#4ade80",D:"#bbf7d0",E:"#d1fae5",Fx:"#fca5a5",F:"#ef4444"}[l]||"#f1f5f9";
    }
    function letterBg(l){
      return{A:"#1e3a8a",B:"#14532d",C:"#166534",D:"#1a3a20",E:"#0f2a18",Fx:"#4a0f0f",F:"#3a0a0a"}[l]||"#1e293b";
    }
    function isValide(l){return l!=="Fx"&&l!=="F";}

    // ── Graphique progression tir — plus grand ──
    var graphSect=d({background:"#0d1525",border:"1px solid #1e3a5f",borderRadius:"10px",padding:"14px",marginBottom:"12px"});
    graphSect.appendChild(h("div",{style:{color:"#f1f5f9",fontWeight:"700",fontSize:"13px",marginBottom:"12px"}},"📈 Progression taux de réussite au tir"));
    if(tirRows.length<2){
      graphSect.appendChild(h("div",{style:{color:"#475569",fontSize:"12px",textAlign:"center",padding:"16px"}},"Pas assez de données (min. 2 séances)"));
    } else {
      var chartArea=d({display:"flex",alignItems:"flex-end",gap:"8px",height:"130px",padding:"0 4px"});
      var maxPct=100; // toujours sur 100% pour lisibilité
      tirRows.forEach(function(item){
        var col2=d({display:"flex",flexDirection:"column",alignItems:"center",gap:"5px",flex:"1"});
        var pct2=item.pct||0;
        var barH=Math.max(6,Math.round(pct2/maxPct*100));
        var barColor=pct2>=66?"#22c55e":pct2>=33?"#f59e0b":"#f87171";
        var val=d({color:barColor,fontSize:"12px",fontWeight:"900",textAlign:"center"});
        val.textContent=pct2+"%";
        var bar=d({width:"100%",borderRadius:"5px 5px 0 0",background:barColor});
        bar.style.height=barH+"px";
        var lbl=d({color:"#64748b",fontSize:"10px",textAlign:"center",lineHeight:"1.3"});
        lbl.textContent=item.session.label.split("–")[0].trim();
        col2.appendChild(val);col2.appendChild(bar);col2.appendChild(lbl);
        chartArea.appendChild(col2);
      });
      // Lignes de référence 33% et 66%
      var chartWrap=d({position:"relative"});
      chartWrap.appendChild(chartArea);
      [33,66].forEach(function(ref){
        var line=d({position:"absolute",left:"0",right:"0",borderTop:"1px dashed "+(ref===66?"#22c55e44":"#f59e0b44"),pointerEvents:"none"});
        line.style.bottom=Math.round(ref/maxPct*100)+"px";
        var refLbl=d({position:"absolute",right:"4px",color:ref===66?"#22c55e66":"#f59e0b66",fontSize:"9px",fontWeight:"700"});
        refLbl.style.bottom=(Math.round(ref/maxPct*100)+2)+"px";
        refLbl.textContent=ref+"%";
        chartWrap.appendChild(line);chartWrap.appendChild(refLbl);
      });
      graphSect.appendChild(chartWrap);
    }
    div.appendChild(graphSect);

    // ── Critères ──
    div.appendChild(h("div",{style:{color:"#94a3b8",fontSize:"11px",fontWeight:"700",letterSpacing:"0.08em",marginBottom:"8px"}},"CRITÈRES D'ÉVALUATION"));
    div.appendChild(evalRow("1. Progression Sprint (S5 → S10)",sprintDetail,sprintPts,3,sprintColor,sprintNA));
    div.appendChild(evalRow("2. Classement Sprint S10",classeDetail,classePts,3,classeColor,classeNA));
    div.appendChild(evalRow("3. Classement Relais S12",relaisDetail,relaisPts,3,relaisColor,relaisNA));
    div.appendChild(evalRow("4. Précision au tir (saison)",tirDetail,tirPts,2,tirColor,tirNA));

    // Critère 5 investissement avec boutons de saisie
    var invRow=d({background:"#0d1525",border:"1px solid #1e3a5f",borderRadius:"10px",padding:"12px 14px",marginBottom:"8px"});
    var invTop=d({display:"flex",alignItems:"flex-start",gap:"10px",marginBottom:"10px"});
    var invInfo=d({flex:"1"});
    invInfo.appendChild(h("div",{style:{color:"#f1f5f9",fontWeight:"700",fontSize:"13px"}},"5. Investissement en cours"));
    invInfo.appendChild(h("div",{style:{color:"#64748b",fontSize:"11px",marginTop:"2px",lineHeight:"1.5"}},"Saisie manuelle par l'enseignant"));
    invTop.appendChild(invInfo);
    var invBadge=d({textAlign:"right",flexShrink:"0"});
    if(investPts!==null){
      invBadge.appendChild(h("div",{style:{color:investColor,fontFamily:"monospace",fontWeight:"900",fontSize:"20px"}},"+"+investPts));
      invBadge.appendChild(h("div",{style:{color:"#475569",fontSize:"10px"}},"/ max +2"));
    } else {
      invBadge.appendChild(h("div",{style:{color:"#475569",fontSize:"13px",fontWeight:"700"}},"—"));
      invBadge.appendChild(h("div",{style:{color:"#334155",fontSize:"10px"}},"non saisi"));
    }
    invTop.appendChild(invBadge);
    invRow.appendChild(invTop);
    var invBtns=d({display:"flex",gap:"6px"});
    [["0","Absent / non investi","#f87171"],["1","Présent, peu investi","#f59e0b"],["2","Toujours présent + très investi","#22c55e"]].forEach(function(opt){
      var active=investPts===parseInt(opt[0]);
      var bb=h("button",{style:{flex:"1",padding:"8px 4px",borderRadius:"8px",border:"2px solid "+(active?opt[2]:"#1e293b"),background:active?opt[2]+"20":"#080e1a",color:active?opt[2]:"#64748b",fontWeight:"700",fontSize:"12px",lineHeight:"1.3"},onClick:function(v){return function(){
        localStorage.setItem(investissementKey(),v);
        setState({});
      };}(opt[0])});
      bb.innerHTML="<span style='font-size:16px;display:block'>+"+opt[0]+"</span><span style='font-size:10px'>"+opt[1]+"</span>";
      invBtns.appendChild(bb);
    });
    invRow.appendChild(invBtns);
    div.appendChild(invRow);

    // ── Note + lettre ──
    var lettre=noteLetter(noteFinale);
    var lCol=letterColor(lettre);
    var lBg=letterBg(lettre);
    var valide=isValide(lettre);
    var noteBox=d({background:allSet?lBg+"cc":"#0a1428",border:"2px solid "+(allSet?lCol:"#1e3a5f"),borderRadius:"14px",padding:"16px",marginBottom:"12px"});

    // Ligne titre
    noteBox.appendChild(h("div",{style:{color:"#64748b",fontSize:"11px",fontWeight:"700",letterSpacing:"0.08em",marginBottom:"10px",textAlign:"center"}},allSet?"NOTE FINALE":"NOTE PROVISOIRE (critères disponibles)"));

    // Ligne note + lettre
    var noteRow=d({display:"flex",alignItems:"center",justifyContent:"center",gap:"16px"});

    // Note chiffrée
    var noteChiffre=d({textAlign:"center"});
    noteChiffre.appendChild(h("div",{style:{color:allSet?lCol:"#f59e0b",fontFamily:"monospace",fontWeight:"900",fontSize:"52px",lineHeight:"1"}},noteFinale+"/20"));
    noteChiffre.appendChild(h("div",{style:{color:"#475569",fontSize:"11px",marginTop:"2px"}},"10 + "+bonusSum+" pts bonus"+(nMissing>0?" ("+nMissing+" critère"+(nMissing>1?"s":"")+' manquant'+(nMissing>1?"s":"")+")":"")));
    noteRow.appendChild(noteChiffre);

    // Lettre ECTS
    var lettreBox=d({background:lCol+"20",border:"2px solid "+lCol,borderRadius:"12px",padding:"12px 18px",textAlign:"center",flexShrink:"0"});
    lettreBox.appendChild(h("div",{style:{color:lCol,fontWeight:"900",fontSize:"40px",lineHeight:"1"}},lettre));
    lettreBox.appendChild(h("div",{style:{color:valide?"#22c55e":"#f87171",fontSize:"11px",fontWeight:"700",marginTop:"4px"}},valide?"✓ Validé":"✗ Non validé"));
    noteRow.appendChild(lettreBox);
    noteBox.appendChild(noteRow);

    div.appendChild(noteBox);

    // ── Export CSV ──
    var exportBtn=h("button",{style:{width:"100%",padding:"12px",background:"#0a1428",border:"1px solid #1e4d8c",borderRadius:"10px",color:"#60a5fa",fontWeight:"700",fontSize:"13px"},onClick:function(){
      var lines=[];
      lines.push("Fiche d'évaluation Biathlon 1A");
      lines.push("Élève;"+student.nom+" "+student.prenom);
      lines.push("Groupe;"+(currentGroup.name||""));
      lines.push("Date export;"+new Date().toLocaleDateString("fr-FR"));
      lines.push("");
      lines.push("Critère;Détail;Points;Max");
      lines.push("1. Sprint S5→S10;"+(sprintNA?"non disponible":sprintDetail)+";"+(sprintPts!==null?sprintPts:"—")+";+3");
      lines.push("2. Classement Sprint S10;"+(classeNA?"non disponible":classeDetail)+";"+(classePts!==null?classePts:"—")+";+3");
      lines.push("3. Classement Relais S12;"+(relaisNA?"non disponible":relaisDetail)+";"+(relaisPts!==null?relaisPts:"—")+";+3");
      lines.push("4. Précision tir saison;"+(tirNA?"non disponible":tirDetail)+";"+(tirPts!==null?tirPts:"—")+";+2");
      lines.push("5. Investissement;saisie manuelle;"+(investPts!==null?investPts:"—")+";+2");
      lines.push("");
      lines.push("Base;10");
      lines.push("Bonus total;"+bonusSum);
      lines.push("NOTE FINALE;"+noteFinale+"/20");
      var csv="\uFEFF"+lines.join("\r\n");
      var a=document.createElement("a");
      a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
      a.download="eval_"+student.nom+"_"+student.prenom+".csv";
      a.click();
    }});
    exportBtn.textContent="📥 Exporter la fiche (.csv)";
    div.appendChild(exportBtn);
  }

  return div;
}

function migrateOldData(){
  var oldKeys=["att","sho","raceData","warmup","notes"];
  var needsMigration=false;
  oldKeys.forEach(function(k){
    if(localStorage.getItem(k)!==null&&localStorage.getItem(k+"_g1")===null)needsMigration=true;
  });
  if(!needsMigration)return;
  oldKeys.forEach(function(k){
    var val=localStorage.getItem(k);
    if(val!==null&&localStorage.getItem(k+"_g1")===null){
      localStorage.setItem(k+"_g1",val);
      console.log("Migrated "+k+" → "+k+"_g1");
    }
  });
  // Migrate students list into group g1 if not already done
  var oldStudents=localStorage.getItem("students");
  if(oldStudents){
    var parsed=null;
    try{parsed=JSON.parse(oldStudents);}catch(e){}
    if(parsed&&parsed.length>0){
      var groups=load("groups",DEFAULT_GROUPS);
      var g1=groups.find(function(g){return g.id==="g1";});
      if(g1){
        // Only overwrite if still using default students (check by count)
        if(g1.students.length===DEFAULT_GROUPS[0].students.length){
          g1.students=parsed;
          save("groups",groups);
          GROUPS=groups;
          console.log("Migrated students → g1 ("+parsed.length+" élèves)");
        }
      }
    }
  }
}

migrateOldData();

// Inject missing groups from DEFAULT_GROUPS into saved GROUPS
(function(){
  var saved=load("groups",null);
  if(!saved)return; // first launch, DEFAULT_GROUPS used directly
  var changed=false;
  DEFAULT_GROUPS.forEach(function(dg){
    if(!saved.find(function(g){return g.id===dg.id;})){
      saved.push(dg);
      changed=true;
      console.log("Injected missing group: "+dg.id);
    }
  });
  if(changed){save("groups",saved);GROUPS=saved;}
})();

function switchGroup(gid){
  CURRENT_GROUP_ID=gid;
  var g=getGroup(gid);
  if(!g)return;
  state.attendance=load("att_"+gid,{});
  state.shooting=load("sho_"+gid,{});
  state.raceData=load("raceData_"+gid,{});
  state.warmup=load("warmup_"+gid,{});
  state.notes=load("notes_"+gid,{});
  state.tab="appel";
  state.sessionId=findCurrentSession();
  state.profilId=null;
  state.tirModal=null;
  state.waveSetup=null;
  state.expandedSess=null;
  state.courseSubTab="course";
  render();
}
